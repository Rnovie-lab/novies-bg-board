<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novie's BG Board</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;font-size:14px}
button{cursor:pointer;border:none;outline:none;font-family:inherit}
input,select,textarea{outline:none;font-family:inherit;font-size:14px}

/* NAV */
#nav{background:#0f0f23;border-bottom:2px solid #2a7fc4;display:flex;align-items:center;padding:0 20px;height:54px;gap:0;position:sticky;top:0;z-index:50}
.nav-brand{font-size:20px;font-weight:900;color:#2a7fc4;letter-spacing:3px;text-transform:uppercase;margin-right:24px;flex-shrink:0}
.nav-tabs{display:flex;gap:2px;flex:1}
.nav-tab{padding:8px 16px;border-radius:4px;font-size:12px;font-weight:700;color:#666;background:transparent;letter-spacing:0.8px;text-transform:uppercase;border:none;cursor:pointer;transition:color 0.15s}
.nav-tab:hover{color:#ccc;background:#1a1a2e}
.nav-tab.active{color:#2a7fc4;background:#1a1a2e}
.nav-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}
.nav-show-info{font-size:12px;color:#555;text-align:right;margin-left:12px}

/* LAYOUT */
#main{padding:24px 28px;max-width:1300px;margin:0 auto}

/* CARDS */
.card{background:#16213e;border:1px solid #2a2a4a;border-radius:8px;padding:20px;margin-bottom:18px}
.card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#888;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.accent{color:#2a7fc4}

/* FORM */
.fg{display:grid;gap:14px;margin-bottom:14px}
.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr 1fr}.g4{grid-template-columns:1fr 1fr 1fr 1fr}
.form-group{display:flex;flex-direction:column;gap:5px}
.lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#666}
.inp{background:#0f0f23;border:1px solid #2a2a4a;border-radius:4px;padding:8px 11px;color:#e0e0e0;width:100%;transition:border-color 0.15s}
.inp:focus{border-color:#2a7fc4}
.sel{background:#0f0f23;border:1px solid #2a2a4a;border-radius:4px;padding:8px 11px;color:#e0e0e0;cursor:pointer;width:100%}
.hint{font-size:11px;color:#888;margin-top:3px;line-height:1.4}
.setup-card{border-color:rgba(255,255,255,0.14)!important}

/* BUTTONS */
.btn{padding:7px 14px;border-radius:4px;font-size:12px;font-weight:700;display:inline-flex;align-items:center;gap:5px;letter-spacing:0.3px;border:none;cursor:pointer;font-family:inherit;transition:background 0.12s}
.btn-primary{background:#2a7fc4;color:#fff}.btn-primary:hover{background:#1a6ab0}
.btn-secondary{background:#2a2a4a;color:#ccc}.btn-secondary:hover{background:#3a3a5a;color:#fff}
.btn-ghost{background:transparent;color:#666;padding:5px 8px}.btn-ghost:hover{color:#ccc;background:#1a1a2e}
.btn-danger{background:#2a1212;color:#e63946;border:1px solid #3a1a1a}.btn-danger:hover{background:#3a1a1a}
.btn-sm{padding:4px 10px;font-size:11px}.btn-xs{padding:3px 7px;font-size:11px}

/* STANDINS ROSTER */
.si-item{background:#0f0f23;border:1px solid #2a2a4a;border-radius:6px;padding:11px 14px;display:flex;align-items:center;gap:14px;margin-bottom:8px}
.si-name{font-weight:700;color:#e0e0e0;min-width:160px}

/* CONTRACT INFO BOX */
.contract-box{background:#0a1420;border:1px solid #1a3a5a;border-radius:6px;padding:12px 14px;margin-top:12px}
.contract-box .rule{font-size:12px;color:#888;line-height:1.7}
.contract-box .rule strong{color:#457b9d}

/* DAY BLOCKS */
.day-block{background:#16213e;border:1px solid #2a2a4a;border-radius:8px;margin-bottom:18px;overflow:hidden}
.day-hdr{background:#2a7fc4;padding:9px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.day-hdr-left{display:flex;align-items:center;gap:10px}
.day-label{font-size:13px;font-weight:900;color:#fff;text-transform:uppercase;letter-spacing:1px}
.day-date-str{font-size:12px;color:rgba(255,255,255,0.75)}
.day-stats{display:flex;gap:16px;align-items:center}
.day-stat{font-size:12px;color:rgba(255,255,255,0.85);font-weight:600}
.day-stat strong{color:#fff}
.day-body{padding:14px;display:none}
.day-body.open{display:block}

/* STAND-INS IN DAY */
.si-section{background:#0a1628;border-left:3px solid #457b9d;border-radius:0 4px 4px 0;padding:10px 14px;margin-bottom:14px}
.si-section-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#457b9d;margin-bottom:8px}
.si-day-row{display:grid;grid-template-columns:180px 1fr 90px 100px 70px;gap:10px;align-items:center;padding:5px 0;border-bottom:1px solid #0f1e30}
.si-day-row:last-child{border-bottom:none}
.si-day-name{font-size:13px;font-weight:600;color:#ccc}
.si-day-char{font-size:12px;color:#555}
.si-hrs-input{width:68px;background:#16213e;border:1px solid #2a2a4a;border-radius:3px;padding:4px 8px;color:#e0e0e0;font-size:13px;text-align:center}
.si-hrs-input:disabled{opacity:0.3}
.si-off-toggle{display:flex;align-items:center;gap:6px;font-size:12px;color:#666;cursor:pointer;user-select:none}
.si-off-toggle input{accent-color:#2a7fc4;cursor:pointer}
.si-working{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
.si-working.on{color:#52b788}.si-working.off{color:#444}

/* SCENE */
.scene-block{margin-bottom:16px}
.scene-hdr{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:#1a2a3e;border-radius:4px;margin-bottom:6px}
.scene-id{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#457b9d}
.scene-set{font-size:13px;font-weight:700;color:#ccc}
.scene-desc{font-size:11px;color:#778}

/* ROLES TABLE */
.roles-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:4px}
.roles-table th{text-align:left;padding:5px 9px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#667;border-bottom:1px solid #2a2a4a}
.roles-table td{padding:7px 9px;border-bottom:1px solid #131a2e;vertical-align:middle}
.roles-table tbody tr{cursor:pointer;transition:background 0.1s}
.roles-table tbody tr:hover td{background:#1e2a40}
.roles-table tr:last-child td{border-bottom:none}

/* BADGES */
.badge{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;padding:2px 7px;border-radius:3px;letter-spacing:0.4px}
.badge-sag{background:#1a2a3e;color:#457b9d}
.badge-sag_hi{background:#1a2a3e;color:#6ca0c8}
.badge-nonunion{background:#2a1a3e;color:#9b72cf}
.badge-standin{background:#1a3a2e;color:#52b788}
.badge-driver{background:#3a2a1a;color:#e9c46a}
.badge-custom{background:#2a2a2a;color:#888}
.badge-minor{background:#3a2a1a;color:#e9c46a;font-size:10px}

/* BUMP TAGS + REUSE */
.bump-tags{display:flex;flex-wrap:wrap;gap:3px}
.bump-tag{background:#1a1a2e;color:#666;font-size:10px;padding:2px 6px;border-radius:3px;border:1px solid #2a2a3a}
.reuse-tag{background:#1a3a2a;color:#52b788;font-size:11px;padding:2px 8px;border-radius:3px;font-weight:700}
.ot-warn{font-size:10px;color:#e63946;font-weight:700;margin-left:4px}

/* TOTALS BAR */
.totals-bar{background:#0a0f20;border-radius:5px;padding:9px 14px;display:flex;align-items:center;gap:20px;margin-top:10px;flex-wrap:wrap}
.total-item{display:flex;align-items:center;gap:5px}
.total-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:#444}
.total-val{font-size:13px;font-weight:700;color:#e0e0e0}
.total-val.red{color:#2a7fc4}.total-val.blue{color:#457b9d}.total-val.green{color:#52b788}.total-val.purple{color:#9b72cf}
.sag-warning{font-size:11px;font-weight:700;color:#e63946;background:#2a0808;padding:3px 9px;border-radius:3px;margin-left:auto}
.sag-ok{font-size:11px;font-weight:700;color:#52b788;background:#0a2a1a;padding:3px 9px;border-radius:3px;margin-left:auto}

/* BUMP SELECTOR IN MODAL */
.bump-select-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.bump-list{border:1px solid #2a2a4a;border-radius:5px;overflow:hidden;margin-top:4px}
.bump-list-item{display:flex;align-items:center;gap:10px;padding:6px 10px;border-bottom:1px solid #131a2e;font-size:12px}
.bump-list-item:last-child{border-bottom:none}
.bump-list-label{flex:1;color:#ccc}
.bump-list-amt{color:#52b788;font-weight:700;min-width:50px;text-align:right}
.bump-empty{font-size:12px;color:#444;padding:8px 0}

/* MODAL */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;z-index:200;padding:20px}
#modal-overlay.open{display:flex}
.modal-box{background:#16213e;border:1px solid #2a2a4a;border-radius:10px;width:100%;max-width:660px;max-height:92vh;overflow-y:auto;padding:22px}
.modal-title{font-size:17px;font-weight:800;color:#e0e0e0;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between}

/* PRINT / EXPORT */
.print-hdr-block{text-align:center;margin-bottom:18px}
.print-show-title{font-size:26px;font-weight:900;text-transform:uppercase;letter-spacing:2px;border-bottom:3px solid #2a7fc4;padding-bottom:8px;margin-bottom:6px}
.print-meta{font-size:13px;color:#888;margin-bottom:3px}
.print-legend{font-size:11px;color:#555;font-style:italic;margin-top:6px}
.print-day{margin-bottom:28px}
.print-day-hdr{background:#2a7fc4;color:#fff;padding:7px 14px;font-weight:900;font-size:14px;display:flex;justify-content:space-between;border-radius:4px 4px 0 0}
.print-table{width:100%;border-collapse:collapse;font-size:12px}
.print-table th{background:#0a0f20;padding:6px 10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#555;border:1px solid #1a2a3a}
.print-table td{padding:6px 10px;border:1px solid #1a2a3a;vertical-align:middle}
.print-table .row-si td{background:#0a1628;color:#457b9d;font-style:italic}
.print-table .row-scene-hdr td{background:#1a2a3e;color:#666;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px}
.print-totals{background:#0a0f20;padding:8px 14px;display:flex;gap:24px;font-size:13px;font-weight:700;border:1px solid #2a2a4a;border-top:none;border-radius:0 0 4px 4px;flex-wrap:wrap}
.grand-totals{background:#0a0f20;border:2px solid #2a7fc4;border-radius:6px;padding:16px 20px;margin-top:16px}
.grand-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:16px;margin-bottom:14px}
.grand-item .glbl{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:2px}
.grand-item .gval{font-size:24px;font-weight:900}
.empty{text-align:center;padding:36px 20px;color:#888;font-size:13px}
.empty-icon{font-size:34px;margin-bottom:10px}

/* CHECKBOX STYLE */
.cb-row{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;font-size:13px;color:#ccc}
.cb-row input[type=checkbox]{accent-color:#2a7fc4;width:15px;height:15px;cursor:pointer;flex-shrink:0}

/* DIVIDER */
.divider{border:none;border-top:1px solid #2a2a4a;margin:14px 0}

@media print{
  #nav,.print-hide,button{display:none!important}
  body{background:#fff;color:#000}
  .print-show-title{color:#000;border-bottom-color:#000}
  .print-day-hdr{background:#000!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .print-table th{background:#eee!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;color:#000;border-color:#999}
  .print-table td{border-color:#ccc;color:#000}
  .print-table .row-si td{background:#e8f4ff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;color:#003366}
  .print-table .row-scene-hdr td{background:#f5f5f5!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;color:#333}
  .print-totals,.grand-totals{background:#f9f9f9!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;color:#000;border-color:#999}
  #main{padding:0;max-width:100%}
  .print-day{page-break-inside:avoid}
}
</style>
</head>
<body>
<div id="nav">
  <div class="nav-brand">Novie's BG Board</div>
  <div class="nav-tabs">
    <button class="nav-tab" data-tab="setup">Setup</button>
    <button class="nav-tab" data-tab="breakdown">Breakdown</button>
    <button class="nav-tab" data-tab="export">Export / Print</button>
  </div>
  <div class="nav-actions">
    <button class="btn btn-secondary btn-sm" onclick="exportJSON()">↓ Export</button>
    <label class="btn btn-secondary btn-sm" style="cursor:pointer">↑ Import JSON<input type="file" accept=".json" style="display:none" onchange="importJSON(event)"></label>
    <label class="btn btn-primary btn-sm" id="pdf-import-btn" style="cursor:pointer" title="Import a Movie Magic Scheduling PDF shootsked">↑ Import PDF<input type="file" accept=".pdf" style="display:none" onchange="importPDF(event)"></label>
    <button class="btn btn-danger btn-sm" onclick="resetAll()">Reset</button>
  </div>
  <div class="nav-show-info" id="nav-info"></div>
</div>

<div id="main"></div>

<div id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal-box" id="modal-box"></div>
</div>

<script>
// ══════════════════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════════════════
const BUMP_LIB = [
  {cat:'Wardrobe', id:'w_maint',   label:'Personal wardrobe maintenance', amt:10},
  {cat:'Wardrobe', id:'w_formal',  label:'Formal evening wear / genuine furs', amt:25},
  {cat:'Wardrobe', id:'w_police',  label:'Police uniform (TV/Theatrical)', amt:36},
  {cat:'Props',    id:'p_pets',    label:'Pets', amt:23},
  {cat:'Props',    id:'p_golf',    label:'Golf clubs (set with bag)', amt:12},
  {cat:'Props',    id:'p_tennis',  label:'Tennis racquet', amt:5.50},
  {cat:'Props',    id:'p_luggage', label:'Luggage (per piece)', amt:5.50},
  {cat:'Props',    id:'p_camera',  label:'Camera', amt:5.50},
  {cat:'Props',    id:'p_skis',    label:'Skis and poles', amt:12},
  {cat:'Props',    id:'p_skates',  label:'Skates / skateboard', amt:5.50},
  {cat:'Vehicles', id:'v_auto',    label:'Auto', amt:37.50},
  {cat:'Vehicles', id:'v_trailer', label:'Trailer', amt:19},
  {cat:'Vehicles', id:'v_bicycle', label:'Bicycle', amt:12},
  {cat:'Vehicles', id:'v_moped',   label:'Moped', amt:15},
  {cat:'Vehicles', id:'v_moto',    label:'Motorcycle', amt:37.50},
  {cat:'Vehicles', id:'v_pmoto',   label:'Police motorcycle', amt:50},
  {cat:'Cosmetic', id:'c_bodymk',  label:'Body makeup (>50% of body)', amt:14},
  {cat:'Cosmetic', id:'c_hairgds', label:'Hair goods (spirit gum)', amt:14},
  {cat:'Cosmetic', id:'c_beard',   label:'Own natural beard required', amt:14},
  {cat:'Cosmetic', id:'c_skull',   label:'Skullcap', amt:14},
  {cat:'Cosmetic', id:'c_haircut', label:'Haircut required', amt:14},
  {cat:'Hazardous',id:'h_rain',    label:'Artificial rain', amt:14},
  {cat:'Hazardous',id:'h_smoke',   label:'Smoke exposure', amt:14},
  {cat:'Hazardous',id:'h_hazard',  label:'Hazardous work (NETCODE)', amt:100},
  {cat:'Hazardous',id:'h_wet',     label:'Wet or snow work', amt:14},
  {cat:'Special',  id:'s_photodbl',label:'Photo double (rate upgrade)', amt:0},
  {cat:'Special',  id:'s_fitting', label:'Costume fitting', amt:0},
];
const BUMP_MAP = Object.fromEntries(BUMP_LIB.map(b=>[b.id,b]));
const BUMP_CATS = [...new Set(BUMP_LIB.map(b=>b.cat))];

const RATE_TIERS = [
  {id:'sag',      label:'SAG',              def:182},
  {id:'sag_hi',   label:'SAG (Hi Rate)',    def:120},
  {id:'nonunion', label:'Non-Union',        def:120},
  {id:'standin',  label:'Stand-In',         def:214},
  {id:'driver',   label:'Precision Driver', def:400},
  {id:'custom',   label:'Custom Rate',      def:0},
];
const RATE_MAP = Object.fromEntries(RATE_TIERS.map(r=>[r.id,r]));

const CONTRACT_TYPES = [
  {id:'tv',         label:'TV — SAG Basic Agreement',        sagMin:25},
  {id:'theatrical', label:'Theatrical — SAG Basic Agreement',sagMin:85},
  {id:'lowbudget',  label:'Low Budget / Modified Agreement', sagMin:0},
  {id:'custom',     label:'Custom',                          sagMin:0},
];

// ══════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════
function defaultState(){
  return {
    show:{name:'',episode:'',version:'1',preparedBy:'',role:'',contractType:'tv',sagMin:25},
    standins:[],
    days:[]
  };
}
let state=(()=>{try{const s=localStorage.getItem('bgboard');return s?JSON.parse(s):defaultState();}catch(e){return defaultState();}})();
// Migrate old state fields
if(!state.show.contractType) state.show.contractType='tv';
if(state.show.sagMin===undefined) state.show.sagMin=25;
if(state.show.role===undefined) state.show.role='';

let currentTab='breakdown';
let expandedDays={};

function save(){try{localStorage.setItem('bgboard',JSON.stringify(state));}catch(e){}}

// ══════════════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════════════
function uid(){return Math.random().toString(36).slice(2,10);}

function calcPay(baseRate,hours,bumps){
  baseRate=parseFloat(baseRate)||0; hours=parseFloat(hours)||0;
  const hr=baseRate/8;
  let pay=baseRate;
  if(hours>8&&hours<=12) pay+=(hours-8)*hr*1.5;
  else if(hours>12){pay+=4*hr*1.5;pay+=(hours-12)*hr*2;}
  (bumps||[]).forEach(b=>pay+=parseFloat(b.amt)||0);
  return pay;
}

function $m(n){return '$'+n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');}

function fmtDate(d){
  if(!d) return '';
  try{const dt=new Date(d+'T12:00:00');return dt.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});}
  catch(e){return d;}
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function getDayStats(day){
  let sag=0,nu=0,cost=0;
  day.scenes.forEach(sc=>(sc.roles||[]).forEach(r=>{
    const n=parseInt(r.count)||1;
    if(r.tier==='nonunion') nu+=n; else sag+=n;
    cost+=calcPay(r.baseRate,r.hours,r.bumps)*n;
  }));
  const siCount=state.standins.filter(si=>!(day.standinOff||{})[si.id]).length;
  return {sag,nu,siCount,cost};
}

function getSIHours(day,si){
  if((day.standinOff||{})[si.id]) return null; // off
  const h=(day.standinHours||{})[si.id];
  return h!==undefined?Math.max(8,h):Math.max(8,si.defaultHours||8);
}

function reuseInfo(roleType,excludeSceneId){
  const matches=[];
  if(!roleType||!roleType.trim()) return matches;
  const q=roleType.trim().toLowerCase();
  state.days.forEach(day=>{
    day.scenes.forEach(sc=>{
      if(sc.id===excludeSceneId) return;
      (sc.roles||[]).forEach(r=>{
        if((r.type||'').trim().toLowerCase()===q) matches.push(sc.sceneId||sc.set||'Sc');
      });
    });
  });
  return [...new Set(matches)];
}

function sagMinWarning(day,stats){
  const min=parseInt(state.show.sagMin)||0;
  if(min===0||stats.nu===0) return null;
  if(stats.sag<min) return `⚠ SAG minimum not met — need ${min-stats.sag} more SAG (min: ${min})`;
  return null;
}

// ══════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════
function render(){
  updateNavInfo(); updateNavTabs();
  document.getElementById('main').innerHTML=
    currentTab==='setup'?renderSetup():currentTab==='breakdown'?renderBreakdown():renderExport();
  attachDayToggles();
}

function updateNavInfo(){
  const el=document.getElementById('nav-info');
  el.innerHTML=state.show.name?`<span style="color:#aaa;font-size:12px">${esc(state.show.name)} · Ep ${esc(state.show.episode)}</span>`:'';
}
function updateNavTabs(){
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===currentTab));
}
function attachDayToggles(){
  document.querySelectorAll('.day-hdr').forEach(hdr=>{
    hdr.addEventListener('click',e=>{
      if(e.target.closest('button')&&!e.target.classList.contains('day-toggle-btn')) return;
      const id=hdr.dataset.dayId;
      expandedDays[id]=!expandedDays[id];
      const body=document.getElementById('day-body-'+id);
      const tog=document.getElementById('day-tog-'+id);
      if(body) body.classList.toggle('open',expandedDays[id]);
      if(tog)  tog.textContent=expandedDays[id]?'▼':'▶';
    });
  });
}

    <div class="contract-box">

function updateShow(key,val){state.show[key]=val;save();updateNavInfo();}

function onContractChange(val){
  const ct=CONTRACT_TYPES.find(c=>c.id===val)||CONTRACT_TYPES[0];
  state.show.contractType=val;
  state.show.sagMin=ct.sagMin;
  save(); render();
}

function deleteStandin(id){
  if(!confirm('Remove this stand-in?')) return;
  state.standins=state.standins.filter(s=>s.id!==id);
  save(); render();
}

// BREAKDOWN PAGE
// ══════════════════════════════════════════════════════════
function renderBreakdown(){
  const addForm=`
    <div class="card" id="add-day-card" style="display:none;margin-bottom:16px">
      <div class="card-title"><span class="accent">◆</span> New Shooting Day</div>
      <div class="fg g3">
        <div class="form-group">
          <label class="lbl">Day #</label>
          <input class="inp" id="new-day-num" type="number" min="1" placeholder="1">
        </div>
        <div class="form-group">
          <label class="lbl">Date</label>
          <input class="inp" id="new-day-date" type="date">
        </div>
        <div class="form-group" style="justify-content:flex-end">
          <label class="lbl">&nbsp;</label>
          <div style="display:flex;gap:8px">
            <button class="btn btn-secondary" onclick="document.getElementById('add-day-card').style.display='none'">Cancel</button>
            <button class="btn btn-primary" onclick="addDay()">Add Day</button>
          </div>
        </div>
      </div>
    </div>`;

  const dayBlocks=state.days.map(day=>{
    const stats=getDayStats(day);
    if(expandedDays[day.id]===undefined) expandedDays[day.id]=true;
    const expanded=expandedDays[day.id];
    const warn=sagMinWarning(day,stats);

    // Standins section
    const siSection=state.standins.length>0?`
      <div class="si-section">
        <div class="si-section-lbl">Stand-Ins</div>
        ${state.standins.map(si=>{
          const off=!!(day.standinOff||{})[si.id];
          const hrs=getSIHours(day,si);
          return `<div class="si-day-row">
            <span class="si-day-name">${esc(si.name)}</span>
            <span class="si-day-char">${esc(si.character)}</span>
            <span style="font-size:11px;color:#444">$${si.rate}/8</span>
            <label class="si-off-toggle">
              <input type="checkbox" ${off?'':'checked'} onchange="toggleSIOff('${day.id}','${si.id}',!this.checked)">
              Working
            </label>
            <input class="si-hrs-input" type="number" min="8" max="24" step="0.5"
              value="${off?si.defaultHours:hrs}" ${off?'disabled':''}
              onchange="updateSIHours('${day.id}','${si.id}',this.value)"
              title="Hours this day (minimum 8)">
          </div>`;
        }).join('')}
      </div>` : '';

    // Scenes
    const scenesHTML=day.scenes.map(sc=>{
      const roles=(sc.roles||[]);
      const rolesHTML=roles.length===0
        ?`<div style="font-size:12px;color:#444;padding:4px 10px 8px">No roles added — click + Role</div>`
        :`<table class="roles-table">
          <thead><tr>
            <th style="width:52px"></th>
            <th>#</th><th>Type</th><th>Tier</th><th>Rate</th><th>Hours</th>
            <th>Bumps</th><th>Notes</th><th>Reuse</th>
          </tr></thead>
          <tbody>${roles.map(r=>{
            const reuse=reuseInfo(r.type,sc.id);
            const bTags=(r.bumps||[]).map(b=>`<span class="bump-tag">${esc(b.label)}</span>`).join('');
            const tier=RATE_MAP[r.tier]||{label:r.tier};
            const ot=parseFloat(r.hours)>8;
            return `<tr onclick="openRoleModal('${day.id}','${sc.id}','${r.id}')" title="Click to edit">
              <td style="text-align:center"><span style="display:inline-block;background:#1e3a5a;color:#5ba4e0;font-size:10px;font-weight:700;letter-spacing:0.4px;padding:3px 7px;border-radius:3px;border:1px solid #2a5a8a;white-space:nowrap">▶ Edit</span></td>
              <td><strong>${r.count||1}</strong>${r.minors?` <span class="badge badge-minor">Minor</span>`:''}</td>
              <td style="font-weight:700;color:#ccc">${esc(r.type)}</td>
              <td><span class="badge badge-${esc(r.tier||'sag')}">${esc(tier.label)}</span></td>
              <td style="color:#888">$${r.baseRate}/8</td>
              <td>${r.hours}h${ot?'<span class="ot-warn"> OT</span>':''}</td>
              <td>${bTags?`<div class="bump-tags">${bTags}</div>`:'<span style="color:#333">—</span>'}</td>
              <td style="color:#666;font-size:11px">${esc(r.notes||'—')}</td>
              <td>${reuse.length?`<span class="reuse-tag">Reuse: Sc. ${esc(reuse[0])}${reuse.length>1?', '+esc(reuse.slice(1).join(', ')):''}</span>`:''}</td>
            </tr>`;
          }).join('')}</tbody>
        </table>`;

      return `<div class="scene-block">
        <div class="scene-hdr">
          <div>
            ${sc.sceneId?`<span class="scene-id">Scene ${esc(sc.sceneId)}</span> `:''}
            <span class="scene-set">${esc(sc.set)}</span>
            ${sc.desc?`<span class="scene-desc"> — ${esc(sc.desc)}</span>`:''}
          </div>
          <div style="display:flex;gap:5px">
            <button class="btn btn-secondary btn-xs" onclick="openSceneModal('${day.id}','${sc.id}')">Edit Scene</button>
            <button class="btn btn-primary btn-xs" onclick="openRoleModal('${day.id}','${sc.id}',null)">+ Role</button>
            <button class="btn btn-danger btn-xs" onclick="deleteScene('${day.id}','${sc.id}')">✕</button>
          </div>
        </div>
        ${rolesHTML}
      </div>`;
    }).join('');

    return `<div class="day-block">
      <div class="day-hdr" data-day-id="${day.id}">
        <div class="day-hdr-left">
          <span id="day-tog-${day.id}" style="color:#fff;font-size:11px;width:16px">${expanded?'▼':'▶'}</span>
          <span class="day-label">Day ${day.dayNumber}</span>
          ${day.date?`<span class="day-date-str">${fmtDate(day.date)}</span>`:''}
        </div>
        <div class="day-stats">
          <span class="day-stat">SI: <strong>${stats.siCount}</strong></span>
          <span class="day-stat">SAG: <strong>${stats.sag}</strong></span>
          <span class="day-stat">NU: <strong>${stats.nu}</strong></span>
          <span class="day-stat">Est: <strong>${$m(stats.cost)}</strong></span>
          <button class="btn btn-ghost btn-xs" style="color:rgba(255,255,255,0.4)" onclick="event.stopPropagation();deleteDay('${day.id}')">✕</button>
        </div>
      </div>
      <div class="day-body ${expanded?'open':''}" id="day-body-${day.id}">
        ${siSection}
        ${scenesHTML}
        ${day.scenes.length===0?`<div class="empty" style="padding:18px"><div class="empty-icon">🎬</div>No scenes yet.</div>`:''}
        <div style="margin-top:10px">
          <button class="btn btn-secondary btn-sm" onclick="openSceneModal('${day.id}',null)">+ Add Scene</button>
        </div>
        <div class="totals-bar">
          <div class="total-item"><span class="total-lbl">Extras (excl SI)</span><span class="total-val red">${stats.sag+stats.nu}</span></div>
          <div class="total-item"><span class="total-lbl">Stand-Ins</span><span class="total-val">${stats.siCount}</span></div>
          <div class="total-item"><span class="total-lbl">SAG</span><span class="total-val blue">${stats.sag}</span></div>
          <div class="total-item"><span class="total-lbl">Non-Union</span><span class="total-val purple">${stats.nu}</span></div>
          <div class="total-item" style="margin-left:auto"><span class="total-lbl">Est. Cost</span><span class="total-val green">${$m(stats.cost)}</span></div>
          ${warn?`<span class="sag-warning">${esc(warn)}</span>`:stats.nu>0?`<span class="sag-ok">✓ SAG minimum met</span>`:''}
        </div>
      </div>
    </div>`;
  }).join('');

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <h2 style="font-size:17px;font-weight:800;color:#e0e0e0">Shooting Days</h2>
      <button class="btn btn-primary" onclick="document.getElementById('add-day-card').style.display='block';document.getElementById('new-day-num').focus()">+ Add Shooting Day</button>
    </div>
    ${addForm}
    ${state.days.length===0?`<div class="empty card"><div class="empty-icon">🎬</div>No shooting days yet — add your first day to get started.</div>`:''}
    ${dayBlocks}`;
}

// EXPORT PAGE
// ══════════════════════════════════════════════════════════
function renderExport(){
  const s=state.show;
  let gSI=0,gSAG=0,gNU=0,gCost=0;

  const dayBlocks=state.days.map(day=>{
    const stats=getDayStats(day);
    gSI+=stats.siCount;gSAG+=stats.sag;gNU+=stats.nu;gCost+=stats.cost;
    const workingSIs=state.standins.filter(si=>!(day.standinOff||{})[si.id]);
    const rows=[];
    if(workingSIs.length){
      rows.push(`<tr class="row-scene-hdr"><td colspan="6">STAND-INS</td></tr>`);
      workingSIs.forEach(si=>{
        const h=getSIHours(day,si);
        rows.push(`<tr class="row-si"><td>1</td>
          <td><strong>${esc(si.name)}</strong> — ${esc(si.character||'—')}</td><td>$${si.rate}/8</td><td>${h}</td><td>—</td><td>—</td></tr>`);
      });
    }
    day.scenes.forEach(sc=>{
      rows.push(`<tr class="row-scene-hdr"><td colspan="6">${sc.sceneId?'Sc. '+esc(sc.sceneId)+' · ':''}${esc(sc.set)}${sc.desc?' — '+esc(sc.desc):''}</td></tr>`);
      (sc.roles||[]).forEach(r=>{
        const bStr=(r.bumps||[]).map(b=>b.label).join(', ')||'—';
        const reuse=reuseInfo(r.type,sc.id);
        rows.push(`<tr>
          <td><strong>${r.count||1}</strong>${r.minors?' <em>(minor)</em>':''}</td>
          <td>${esc(r.type)}</td><td>$${r.baseRate}/8</td><td>${r.hours}</td>
          <td style="font-size:11px">${esc(bStr)}</td>
          <td style="font-size:11px">${esc(r.notes||'')}${reuse.length?` <em>[Reuse: Sc. ${esc(reuse[0])}${reuse.length>1?', '+esc(reuse.slice(1).join(', ')):''} ]</em>`:''}</td>
        </tr>`);
      });
    });

    return `<div class="print-day">
      <div class="print-day-hdr">
        <span>DAY ${day.dayNumber} — ${day.date?fmtDate(day.date):'Date TBD'}</span>
      </div>
      <table class="print-table">
        <thead><tr>
          <th style="width:5%">#</th><th style="width:28%">Type</th>
          <th style="width:10%">Rate</th><th style="width:7%">Hrs</th>
          <th style="width:18%">Bumps</th><th>Notes</th>
        </tr></thead>
        <tbody>${rows.join('')}</tbody>
      </table>
      <div class="print-totals">
        <span>TOTAL EXTRAS (excl SI's): <strong style="color:#2a7fc4">${stats.sag+stats.nu}</strong></span>
        <span>STAND-INS: <strong>${stats.siCount}</strong></span>
        <span>SAG: <strong style="color:#457b9d">${stats.sag}</strong></span>
        <span>NON UNION: <strong style="color:#9b72cf">${stats.nu}</strong></span>
        <span style="margin-left:auto">Est: <strong style="color:#52b788">${$m(stats.cost)}</strong></span>
      </div>
    </div>`;
  }).join('');

  return `
  <div class="print-hdr-block">
    <div class="print-show-title">${s.episode?esc(s.episode)+' ':''} Extras Breakdown</div>
    ${s.name?`<div class="print-meta"><strong>Show:</strong> ${esc(s.name)} &nbsp;|&nbsp; <strong>Version:</strong> ${esc(s.version||'—')}</div>`:''}
    ${s.preparedBy?`<div class="print-meta">Prepared by: ${esc(s.preparedBy)}${s.role?' · '+esc(s.role):''}</div>`:''}
  </div>
  ${state.days.length===0?`<div class="empty card"><div class="empty-icon">📄</div>No data yet.</div>`:''}
  ${dayBlocks}
  <div class="grand-totals">
    <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#555;margin-bottom:12px">Grand Totals</div>
    <div class="grand-grid">
      <div class="grand-item"><div class="glbl">Stand-Ins</div><div class="gval" style="color:#52b788">${gSI}</div></div>
      <div class="grand-item"><div class="glbl">SAG Background</div><div class="gval" style="color:#457b9d">${gSAG}</div></div>
      <div class="grand-item"><div class="glbl">Non-Union</div><div class="gval" style="color:#9b72cf">${gNU}</div></div>
      <div class="grand-item"><div class="glbl">Total BG + SI</div><div class="gval" style="color:#2a7fc4">${gSI+gSAG+gNU}</div></div>
    </div>
    <div style="font-size:13px;color:#666">Estimated Total Cost: <strong style="color:#52b788;font-size:16px">${$m(gCost)}</strong></div>
  </div>
  <div style="text-align:center;margin-top:22px" class="print-hide">
    <button class="btn btn-primary" style="font-size:15px;padding:11px 28px" onclick="window.print()">🖨 Print / Save as PDF</button>
    <div style="font-size:12px;color:#444;margin-top:8px">Choose <strong style="color:#888">Save as PDF</strong> in the print dialog</div>
  </div>`;
}

// ══════════════════════════════════════════════════════════
// DAY / SCENE / ROLE OPS
// ══════════════════════════════════════════════════════════
function addDay(){
  const num=document.getElementById('new-day-num').value;
  if(!num){alert('Day number required');return;}
  const id=uid();
  state.days.push({id,dayNumber:parseInt(num),date:document.getElementById('new-day-date').value,scenes:[],standinOff:{},standinHours:{}});
  state.days.sort((a,b)=>a.dayNumber-b.dayNumber);
  expandedDays[id]=true;
  save();render();
}
function deleteDay(id){if(!confirm('Delete this day and all scenes?'))return;state.days=state.days.filter(d=>d.id!==id);save();render();}
function deleteScene(dayId,sceneId){if(!confirm('Delete this scene?'))return;const d=state.days.find(x=>x.id===dayId);if(d)d.scenes=d.scenes.filter(s=>s.id!==sceneId);save();render();}
function deleteRole(dayId,sceneId,roleId){const d=state.days.find(x=>x.id===dayId);const s=d?.scenes.find(x=>x.id===sceneId);if(s)s.roles=(s.roles||[]).filter(r=>r.id!==roleId);save();render();}

function toggleSIOff(dayId,siId,isOff){
  const day=state.days.find(d=>d.id===dayId);if(!day)return;
  if(!day.standinOff) day.standinOff={};
  day.standinOff[siId]=isOff;
  save();render();
}
function updateSIHours(dayId,siId,val){
  const day=state.days.find(d=>d.id===dayId);if(!day)return;
  if(!day.standinHours) day.standinHours={};
  day.standinHours[siId]=Math.max(8,parseFloat(val)||8);
  save();
}

function openModal(html){document.getElementById('modal-box').innerHTML=html;document.getElementById('modal-overlay').classList.add('open');}

// ── STANDIN ──────────────────────────────────────────────
function openStandinModal(id){
  const si=id?state.standins.find(s=>s.id===id):null;
  openModal(`
    <div class="modal-title">${si?'Edit':'Add'} Stand-In<button class="btn btn-ghost" onclick="closeModal()">✕</button></div>
    <div class="fg g2">
      <div class="form-group"><label class="lbl">Name</label>
        <input class="inp" id="si-name" value="${esc(si?.name||'')}" placeholder="e.g. Amy Stand In"></div>
      <div class="form-group"><label class="lbl">Covers Character(s)</label>
        <input class="inp" id="si-char" value="${esc(si?.character||'')}" placeholder="e.g. Amy, Sarah"></div>
    </div>
    <div class="fg g2">
      <div class="form-group"><label class="lbl">Rate ($/8hr)</label>
        <input class="inp" id="si-rate" type="number" value="${si?.rate||214}"></div>
      <div class="form-group"><label class="lbl">Default Hours/Day</label>
        <input class="inp" id="si-hrs" type="number" step="0.5" min="8" value="${si?.defaultHours||12}"></div>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveStandin('${id||''}')">Save</button>
    </div>`);
  setTimeout(()=>document.getElementById('si-name')?.focus(),50);
}
function saveStandin(id){
  const name=document.getElementById('si-name').value.trim();
  if(!name){alert('Name required');return;}
  const si={id:id||uid(),name,character:document.getElementById('si-char').value.trim(),
    rate:parseFloat(document.getElementById('si-rate').value)||214,
    defaultHours:Math.max(8,parseFloat(document.getElementById('si-hrs').value)||12)};
  state.standins=state.standins.filter(s=>s.id!==si.id);
  state.standins.push(si);
  save();closeModal();render();
}

// ── SCENE ────────────────────────────────────────────────
function openSceneModal(dayId,sceneId){
  const day=state.days.find(d=>d.id===dayId);
  const sc=sceneId?day?.scenes.find(s=>s.id===sceneId):null;
  openModal(`
    <div class="modal-title">${sc?'Edit':'Add'} Scene<button class="btn btn-ghost" onclick="closeModal()">✕</button></div>
    <div class="fg g2">
      <div class="form-group"><label class="lbl">Scene ID (e.g. 217 Sc12)</label>
        <input class="inp" id="sc-id" value="${esc(sc?.sceneId||'')}" placeholder="217 Sc12"></div>
      <div class="form-group"><label class="lbl">Set / Location *</label>
        <input class="inp" id="sc-set" value="${esc(sc?.set||'')}" placeholder="e.g. AMY'S OFFICE"></div>
    </div>
    <div class="form-group" style="margin-bottom:16px"><label class="lbl">Description (optional)</label>
      <input class="inp" id="sc-desc" value="${esc(sc?.desc||'')}" placeholder="Brief description"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveScene('${dayId}','${sceneId||''}')">Save Scene</button>
    </div>`);
  setTimeout(()=>document.getElementById('sc-set')?.focus(),50);
}
function saveScene(dayId,sceneId){
  const set=document.getElementById('sc-set').value.trim();
  if(!set){alert('Set/Location required');return;}
  const day=state.days.find(d=>d.id===dayId);if(!day)return;
  const sc={id:sceneId||uid(),sceneId:document.getElementById('sc-id').value.trim(),set,desc:document.getElementById('sc-desc').value.trim(),roles:[]};
  if(sceneId){const ex=day.scenes.find(s=>s.id===sceneId);if(ex)sc.roles=ex.roles||[];}
  day.scenes=day.scenes.filter(s=>s.id!==sceneId);
  day.scenes.push(sc);
  save();closeModal();render();
}

// ── ROLE ─────────────────────────────────────────────────
let _bumps=[];  // [{id,label,amt}]

function bumpSelectOpts(){
  return BUMP_CATS.map(cat=>`<optgroup label="${cat}">${
    BUMP_LIB.filter(b=>b.cat===cat).map(b=>
      `<option value="${b.id}">${esc(b.label)}${b.amt>0?' (+$'+b.amt+')':b.id==='s_photodbl'?' (rate upgrade)':''}</option>`
    ).join('')
  }</optgroup>`).join('');
}

function openRoleModal(dayId,sceneId,roleId){
  const day=state.days.find(d=>d.id===dayId);
  const sc=day?.scenes.find(s=>s.id===sceneId);
  const role=roleId?sc?.roles.find(r=>r.id===roleId):null;
  _bumps=role?[...(role.bumps||[])].map(b=>({...b})):[];

  const tierOpts=RATE_TIERS.map(t=>
    `<option value="${t.id}" ${(role?.tier||'sag')===t.id?'selected':''}>${t.label}</option>`).join('');

  openModal(`
    <div class="modal-title">${role?'Edit':'Add'} Role
      ${role?`<div style="display:flex;gap:8px"><button class="btn btn-danger btn-sm" onclick="deleteRole('${dayId}','${sceneId}','${roleId}');closeModal()">Delete</button><button class="btn btn-ghost" onclick="closeModal()">✕</button></div>`
             :`<button class="btn btn-ghost" onclick="closeModal()">✕</button>`}
    </div>
    <div class="form-group" style="margin-bottom:14px">
      <label class="lbl">Role Type / Description *</label>
      <input class="inp" id="r-type" value="${esc(role?.type||'')}" placeholder="e.g. Park BG w/ cars">
    </div>
    <div class="fg g4" style="margin-bottom:14px">
      <div class="form-group"><label class="lbl"># People</label>
        <input class="inp" id="r-count" type="number" min="1" value="${role?.count||1}" oninput="updatePay()"></div>
      <div class="form-group"><label class="lbl">Rate Tier</label>
        <select class="sel" id="r-tier" onchange="onTierChange(this.value)">${tierOpts}</select></div>
      <div class="form-group"><label class="lbl">Base Rate ($)</label>
        <input class="inp" id="r-rate" type="number" value="${role?.baseRate||182}" oninput="updatePay()"></div>
      <div class="form-group"><label class="lbl">Hours</label>
        <input class="inp" id="r-hours" type="number" min="8" max="24" step="0.5" value="${role?.hours||8}" oninput="updatePay()"></div>
    </div>
    <div id="pay-preview" style="background:#0a0f20;border-radius:5px;padding:8px 13px;margin-bottom:14px;font-size:13px">—</div>

    <hr class="divider">
    <div class="lbl" style="margin-bottom:8px">Bumps</div>
    <div class="bump-select-row">
      <select class="sel" id="bump-picker" style="flex:1"><option value="">— Select bump type —</option>${bumpSelectOpts()}</select>
      <button class="btn btn-secondary btn-sm" onclick="addPresetBump()">Add</button>
    </div>
    <div class="bump-select-row" style="margin-bottom:4px">
      <input class="inp" id="custom-bump-lbl" placeholder="Custom bump description" style="flex:1">
      <input class="inp" id="custom-bump-amt" type="number" placeholder="$" style="width:80px">
      <button class="btn btn-secondary btn-sm" onclick="addCustomBump()">Add</button>
    </div>
    <div id="bumps-list"></div>

    <hr class="divider">
    <div class="fg g2" style="margin-bottom:14px">
      <div class="form-group">
        <label class="lbl">Notes</label>
        <input class="inp" id="r-notes" value="${esc(role?.notes||'')}" placeholder="">
      </div>
      <div class="form-group" style="justify-content:flex-end">
        <label class="lbl">&nbsp;</label>
        <label class="cb-row" style="padding:8px 0">
          <input type="checkbox" id="r-minors" ${role?.minors?'checked':''}> Minors
        </label>
      </div>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveRole('${dayId}','${sceneId}','${roleId||''}')">Save Role</button>
    </div>`);

  setTimeout(()=>{renderBumpsList();updatePay();document.getElementById('r-type')?.focus();},50);
}

function onTierChange(val){
  const t=RATE_MAP[val];if(t&&t.def>0)document.getElementById('r-rate').value=t.def;
  updatePay();
}

function updatePay(){
  const rate=parseFloat(document.getElementById('r-rate')?.value)||0;
  const hrs=parseFloat(document.getElementById('r-hours')?.value)||0;
  const cnt=parseInt(document.getElementById('r-count')?.value)||1;
  const pay=calcPay(rate,hrs,_bumps);
  const el=document.getElementById('pay-preview');if(!el)return;
  const ot=hrs>8,dt=hrs>12;
  el.innerHTML=`<span style="color:#555;font-size:11px">Per person:</span>
    <strong style="color:#52b788;font-size:15px;margin:0 8px">${$m(pay)}</strong>
    <span style="color:#555">× ${cnt} =</span>
    <strong style="color:#52b788;margin-left:6px">${$m(pay*cnt)}</strong>
    ${ot?`<span style="color:#e63946;font-size:11px;font-weight:700;margin-left:10px">⚠ OT after 8hrs${dt?' · DT after 12hrs':''}</span>`:''}`;
}

function addPresetBump(){
  const sel=document.getElementById('bump-picker');
  const id=sel.value;if(!id)return;
  if(_bumps.find(b=>b.id===id)){sel.value='';return;}
  const b=BUMP_MAP[id];
  _bumps.push({id,label:b.label,amt:b.amt});
  sel.value='';renderBumpsList();updatePay();
}

function addCustomBump(){
  const lbl=document.getElementById('custom-bump-lbl').value.trim();
  const amt=parseFloat(document.getElementById('custom-bump-amt').value)||0;
  if(!lbl){alert('Description required');return;}
  _bumps.push({id:'c_'+uid(),label:lbl,amt,custom:true});
  document.getElementById('custom-bump-lbl').value='';
  document.getElementById('custom-bump-amt').value='';
  renderBumpsList();updatePay();
}

function removeBump(id){
  _bumps=_bumps.filter(b=>b.id!==id);
  renderBumpsList();updatePay();
}

function renderBumpsList(){
  const el=document.getElementById('bumps-list');if(!el)return;
  if(!_bumps.length){el.innerHTML=`<div class="bump-empty">No bumps added</div>`;return;}
  el.innerHTML=`<div class="bump-list">${_bumps.map(b=>`
    <div class="bump-list-item">
      <span class="bump-list-label">${esc(b.label)}</span>
      <span class="bump-list-amt">${b.amt>0?'+$'+b.amt.toFixed(2):''}</span>
      <button class="btn btn-ghost btn-xs" style="color:#e63946;padding:2px 6px" onclick="removeBump('${b.id}')">✕</button>
    </div>`).join('')}</div>`;
}

function saveRole(dayId,sceneId,roleId){
  const type=document.getElementById('r-type').value.trim();
  if(!type){alert('Role type required');return;}
  const role={
    id:roleId||uid(), type,
    count:parseInt(document.getElementById('r-count').value)||1,
    tier:document.getElementById('r-tier').value,
    baseRate:parseFloat(document.getElementById('r-rate').value)||0,
    hours:Math.max(8,parseFloat(document.getElementById('r-hours').value)||8),
    bumps:[..._bumps],
    notes:document.getElementById('r-notes').value.trim(),
    minors:document.getElementById('r-minors').checked
  };
  const day=state.days.find(d=>d.id===dayId);
  const sc=day?.scenes.find(s=>s.id===sceneId);if(!sc)return;
  sc.roles=(sc.roles||[]).filter(r=>r.id!==role.id);
  sc.roles.push(role);
  save();closeModal();render();
}

function exportJSON(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`BGBoard_${state.show.episode||'export'}_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}
function importJSON(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{try{state=JSON.parse(ev.target.result);save();render();alert('Imported.');}catch(e){alert('Invalid file.');}};
  r.readAsText(f);e.target.value='';
}

// ── PDF IMPORT ────────────────────────────────────────────────────────────────
// Use relative URL so this works both locally (via bgboard_server.py)
// and when hosted on Railway or any other server.
const PDF_ENDPOINT='/parse-pdf';
let _pdfServerAvailable=null;

function fetchWithTimeout(url, opts, ms){
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),ms);
  return fetch(url,{...opts,signal:ctrl.signal}).finally(()=>clearTimeout(tid));
}

async function checkPdfServer(){
  if(_pdfServerAvailable!==null) return _pdfServerAvailable;
  // On file:// there's no server; on http:// there always is
  if(location.protocol==='file:'){_pdfServerAvailable=false;updatePdfBtn();return false;}
  _pdfServerAvailable=true;
  updatePdfBtn();
  return true;
}

function updatePdfBtn(){
  const btn=document.getElementById('pdf-import-btn');
  if(!btn)return;
  if(_pdfServerAvailable===false){
    btn.style.opacity='0.45';
    btn.title='PDF import requires the server.\nRun: python3 bgboard_server.py';
  } else {
    btn.style.opacity='1';
    btn.title='Import a Movie Magic Scheduling PDF shootsked';
  }
}

async function importPDF(e){
  const f=e.target.files[0];
  e.target.value='';
  if(!f) return;

  _pdfServerAvailable=null;
  const ok=await checkPdfServer();
  if(!ok){
    alert(
      'PDF import requires the local server.\n\n'+
      'In Terminal, cd into your BG Board folder and run:\n\n'+
      '    python3 bgboard_server.py\n\n'+
      'Then use the app at http://localhost:8765'
    );
    return;
  }

  // Show spinner
  const btn=document.getElementById('pdf-import-btn');
  const orig=btn.textContent;
  btn.textContent='Parsing…';
  btn.style.pointerEvents='none';

  try{
    // Send File object directly — browser sets Content-Length automatically
    const res=await fetchWithTimeout(PDF_ENDPOINT,{
      method:'POST',
      headers:{'Content-Type':'application/pdf'},
      body:f
    },60000);
    let data;
    try{ data=await res.json(); }
    catch(je){ throw new Error('Server returned non-JSON response (status '+res.status+')'); }
    if(!res.ok||!data.ok){
      alert('Parse error: '+(data.error||'Unknown error'));
      return;
    }
    const s=data.state;
    const dayCount=s.days?.length||0;
    const sceneCount=(s.days||[]).reduce((n,d)=>n+(d.scenes?.length||0),0);
    const roleCount=(s.days||[]).reduce((n,d)=>n+(d.scenes||[]).reduce((m,sc)=>m+(sc.roles?.length||0),0),0);

    if(!confirm(
      `Import shootsked?\n\n`+
      `Show: ${s.show?.name||'?'} Ep ${s.show?.episode||'?'}\n`+
      `${dayCount} shooting days · ${sceneCount} scenes · ${roleCount} BG role entries\n\n`+
      `This will REPLACE your current data.`
    )) return;

    state=s;
    save();
    currentTab='breakdown';
    render();
    alert(`✓ Imported ${dayCount} days, ${sceneCount} scenes.`);
  }catch(err){
    alert('PDF import failed: '+err.message);
  }finally{
    btn.textContent=orig;
    btn.style.pointerEvents='';
  }
}

// Check server availability on load (non-blocking)
setTimeout(checkPdfServer, 800);

function resetAll(){
  if(!confirm('Clear all data and start over?'))return;
  state=defaultState();expandedDays={};save();currentTab='setup';render();
}
