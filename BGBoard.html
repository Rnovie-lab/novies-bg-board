<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novie's BG Board</title>
<style>
:root{
  --bg-page:#22232b;--bg-nav:#14151b;--bg-card:#2a2c36;--bg-el:#1a1c24;
  --bg-sun:#0e0f13;--bg-inp:#181920;--bg-hov:#1e1f28;--bg-th:#1e2028;
  --bg-sh:#22242e;--bg-si:#181e2c;--bg-ct:#0a1018;--bg-pd:#0a0f20;
  --bg-ps:#0a1628;--bg-psc:#1a2a3e;--bg-sid:#0e1824;--bg-bt:#151720;
  --bg-rt:#0e2018;--bg-rh:#1e2840;--bg-ra:rgba(255,255,255,0.022);
  --bg-bs:#252838;--bg-bsh:#303348;--bg-dn:#220e0e;--bg-dnh:#3a1a1a;
  --bg-bsag:#141e2e;--bg-bnu:#1e1230;--bg-bsi:#121e18;--bg-bdr:#26200e;
  --bg-bcu:#222;--bg-sw:#220808;--bg-so:#091a10;--bg-ds:#1a1c24;
  --bg-gd:#0a0f20;--bg-bdsi:#0e1a14;--bg-modal:#2a2c36;
  --br:#33354a;--br2:#252838;--br3:#4a4d66;--br4:#2a2a4a;
  --br5:#1a1c24;--br6:#22242e;--br7:#1a2a3a;--br8:#1a3a5a;
  --br9:#0f1520;--brp:#2a2c3a;--brb:#131a2e;--brd:#2a2a4a;
  --t1:#e0e0e0;--t2:#d0d0d0;--t3:#ccc;--t4:#bbb;
  --tlbl:#aaa;--tmut:#999;--tfnt:#888;--tvfnt:#778;--tph:#42445a;
}
[data-theme="light"]{
  --bg-page:#f0f2f7;--bg-nav:#ffffff;--bg-card:#ffffff;--bg-el:#f5f6fa;
  --bg-sun:#eceef5;--bg-inp:#f8f9fb;--bg-hov:#eef0f8;--bg-th:#f0f2f8;
  --bg-sh:#e8eaf2;--bg-si:#e8f0f8;--bg-ct:#e8f2f8;--bg-pd:#f0f4f8;
  --bg-ps:#e8f0f8;--bg-psc:#dde8f0;--bg-sid:#e0e8f0;--bg-bt:#eaecf4;
  --bg-rt:#e0f0ea;--bg-rh:#dde8f4;--bg-ra:rgba(0,0,0,0.025);
  --bg-bs:#e8eaf2;--bg-bsh:#dddff0;--bg-dn:#fde8e8;--bg-dnh:#fad0d0;
  --bg-bsag:#dce8f4;--bg-bnu:#f0e8fa;--bg-bsi:#e0f0ea;--bg-bdr:#f4f0de;
  --bg-bcu:#f0f0f0;--bg-sw:#fde8e8;--bg-so:#e0f0ea;--bg-ds:#f5f6fa;
  --bg-gd:#f0f4f8;--bg-bdsi:#ddf0e4;--bg-modal:#ffffff;
  --br:#c8ccdc;--br2:#d0d4e4;--br3:#b0b8d0;--br4:#c0c8dc;
  --br5:#e0e4f0;--br6:#d0d4e4;--br7:#c0c8dc;--br8:#90aac4;
  --br9:#d0d4e4;--brp:#c8ccdc;--brb:#c8d0e4;--brd:#d0d4e4;
  --t1:#1a1a2e;--t2:#252535;--t3:#353545;--t4:#3a3a5a;
  --tlbl:#3a3a55;--tmut:#555570;--tfnt:#606070;--tvfnt:#707080;--tph:#aab0cc;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;background:var(--bg-page);color:var(--t1);min-height:100vh;font-size:14px}
button{cursor:pointer;border:none;outline:none;font-family:inherit}
input,select,textarea{outline:none;font-family:inherit;font-size:14px}

/* NAV */
#nav{background:var(--bg-nav);border-bottom:2px solid #2a7fc4;display:flex;align-items:center;padding:0 28px;height:78px;gap:0;position:sticky;top:0;z-index:50}
.nav-brand{display:flex;align-items:center;margin-right:16px;flex-shrink:0}
.nav-tabs{display:flex;gap:2px;flex:1}
.nav-tab{padding:8px 16px;border-radius:4px;font-size:12px;font-weight:700;color:var(--tmut);background:transparent;letter-spacing:0.8px;text-transform:uppercase;border:none;cursor:pointer;transition:color 0.15s}
.nav-tab:hover{color:var(--t3);background:var(--bg-hov)}
.nav-tab.active{color:#2a7fc4;background:var(--bg-hov)}
.nav-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}
.nav-show-info{font-size:12px;color:var(--tmut);text-align:right;margin-left:14px}

/* LAYOUT */
#main{padding:24px 28px;max-width:1300px;margin:0 auto}

/* CARDS */
.card{background:var(--bg-card);border:1px solid var(--br);border-radius:8px;padding:20px;margin-bottom:18px}
.card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--tfnt);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.accent{color:#2a7fc4}

/* FORM */
.fg{display:grid;gap:14px;margin-bottom:14px}
.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr 1fr}.g4{grid-template-columns:1fr 1fr 1fr 1fr}
.form-group{display:flex;flex-direction:column;gap:5px}
.lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--tlbl)}
.inp{background:var(--bg-inp);border:1px solid var(--br);border-radius:4px;padding:8px 11px;color:var(--t1);width:100%;transition:border-color 0.15s}
.inp:focus{border-color:#2a7fc4}
.inp::placeholder{color:var(--tph)}
.sel{background:var(--bg-inp);border:1px solid var(--br);border-radius:4px;padding:8px 11px;color:var(--t1);cursor:pointer;width:100%}
.hint{font-size:11px;color:var(--tmut);margin-top:3px;line-height:1.4}
.setup-card{border-color:var(--br)!important}

/* BUTTONS */
.btn{padding:7px 14px;border-radius:4px;font-size:12px;font-weight:700;display:inline-flex;align-items:center;gap:5px;letter-spacing:0.3px;border:none;cursor:pointer;font-family:inherit;transition:background 0.12s}
.btn-primary{background:#2a7fc4;color:#fff}.btn-primary:hover{background:#1a6ab0}
.btn-secondary{background:var(--bg-bs);color:var(--t4)}.btn-secondary:hover{background:var(--bg-bsh);color:var(--t1)}
.btn-success{background:#2d7a50;color:#fff}.btn-success:hover{background:#247042}
.btn-ghost{background:transparent;color:var(--tmut);padding:5px 8px}.btn-ghost:hover{color:var(--t3);background:var(--bg-el)}
.btn-danger{background:var(--bg-dn);color:#e63946;border:1px solid var(--bg-dnh)}.btn-danger:hover{background:var(--bg-dnh)}
.btn-sm{padding:4px 10px;font-size:11px}.btn-xs{padding:3px 7px;font-size:11px}

/* STANDINS ROSTER */
.si-item{background:var(--bg-sun);border:1px solid var(--br2);border-radius:6px;padding:11px 14px;display:flex;align-items:center;gap:14px;margin-bottom:8px}
.si-name{font-weight:700;color:var(--t1);min-width:160px}

/* CONTRACT INFO BOX */
.contract-box{background:var(--bg-ct);border:1px solid var(--br8);border-radius:6px;padding:12px 14px;margin-top:12px}
.contract-box .rule{font-size:12px;color:var(--tfnt);line-height:1.7}
.contract-box .rule strong{color:#457b9d}

/* DAY BLOCKS */
.day-block{background:var(--bg-card);border:1px solid var(--br3);border-radius:8px;margin-bottom:20px;overflow:hidden}
.day-hdr{background:linear-gradient(to right,#1d4068,#182848);border-left:5px solid #3a90d4;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.day-hdr-left{display:flex;align-items:center;gap:12px}
.day-label{font-size:15px;font-weight:900;color:#fff;text-transform:uppercase;letter-spacing:1.2px}
.day-date-str{font-size:12px;color:rgba(255,255,255,0.7);font-weight:400}
.day-stats{display:flex;gap:18px;align-items:center}
.day-stat{font-size:11px;color:rgba(255,255,255,0.65);font-weight:600;letter-spacing:0.3px}
.day-stat strong{color:#fff;font-size:13px}
.day-stat-sag{font-size:11px;color:rgba(255,255,255,0.75);font-weight:700;letter-spacing:0.3px}
.day-stat-sag strong{color:#7cc4f0;font-size:16px;font-weight:900}
.day-body{padding:16px;display:none}
.day-body.open{display:block}

/* STAND-INS IN DAY */
.si-section{background:var(--bg-si);border-left:3px solid #457b9d;border-radius:0 4px 4px 0;padding:6px 14px;margin-top:10px}
.si-section-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#457b9d;margin-bottom:4px}
.si-day-row{display:grid;grid-template-columns:160px 1fr 80px 90px 60px;gap:8px;align-items:center;padding:1px 0;border-bottom:1px solid var(--br9)}
.si-day-row:last-child{border-bottom:none}
.si-day-name{font-size:11px;font-weight:600;color:var(--t3)}
.si-day-char{font-size:10px;color:var(--tfnt)}
.si-hrs-input{width:52px;background:var(--bg-sh);border:1px solid var(--br);border-radius:3px;padding:1px 6px;color:var(--t1);font-size:11px;text-align:center}
.si-hrs-input:disabled{opacity:0.3}
.si-off-toggle{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--tmut);cursor:pointer;user-select:none}
.si-off-toggle input{accent-color:#2a7fc4;cursor:pointer;width:12px;height:12px}
.si-working{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
.si-working.on{color:#52b788}.si-working.off{color:var(--tvfnt)}

/* SCENE */
.scene-block{margin-bottom:18px;border-left:3px solid var(--br2);padding-left:0;border-radius:0 0 0 0}
.scene-id{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#3a6ea8;background:var(--bg-sid);padding:2px 7px;border-radius:3px}
.scene-set{font-size:13px;font-weight:700;color:var(--t2)}
.scene-desc{font-size:11px;color:var(--tmut)}
/* scene header spans full width — badge + set stack via flex-wrap */
tr.scene-hdr-row>td{background:var(--bg-sh);padding:6px 6px;vertical-align:middle}
tr.scene-hdr-row>.shdr-main{padding-left:12px;padding-right:6px}
.shdr-inner{display:flex;flex-wrap:wrap;align-items:baseline;gap:4px 8px}
.shdr-inner .scene-set{flex:1;min-width:120px;word-break:break-word}
tr.scene-hdr-row>.shdr-btns{text-align:right;white-space:nowrap;padding-right:10px}

/* ROLES TABLE */
.roles-table{width:100%;border-collapse:collapse;table-layout:fixed;font-size:12px;margin-bottom:0}
.roles-table colgroup .col-edit{width:36px}
.roles-table colgroup .col-count{width:44px}
.roles-table colgroup .col-type{width:28%}
.roles-table tbody tr td:nth-child(3){font-size:11px;font-weight:400}
.roles-table colgroup .col-tier{width:72px}
.roles-table colgroup .col-rate{width:72px}
.roles-table colgroup .col-hours{width:72px}
.roles-table colgroup .col-bumps{width:90px}
.roles-table colgroup .col-notes{width:90px}
.roles-table colgroup .col-reuse{width:auto}
.roles-table th{text-align:left;padding:6px 9px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--tlbl);border-bottom:1px solid var(--br6);background:var(--bg-th)}
.roles-table td{padding:8px 9px;border-bottom:1px solid var(--br5);vertical-align:middle}
.roles-table tbody tr{cursor:pointer;transition:background 0.1s}
.roles-table tbody tr:nth-child(even) td{background:var(--bg-ra)}
.roles-table tbody tr:hover td{background:var(--bg-rh)!important}
.roles-table tr:last-child td{border-bottom:none}
.edit-icon{display:inline-block;color:var(--tvfnt);font-size:13px;transition:color 0.1s;padding:0 2px}
.roles-table tbody tr:hover .edit-icon{color:#5ba4e0}
tr.no-roles-row{cursor:pointer}
tr.no-roles-row:hover td{color:var(--tlbl)!important;background:var(--bg-th)!important}

/* BADGES */
.badge{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;padding:2px 7px;border-radius:3px;letter-spacing:0.4px}
.badge-sag{background:var(--bg-bsag);color:#457b9d}
.badge-sag_hi{background:var(--bg-bsag);color:#6ca0c8}
.badge-nonunion{background:var(--bg-bnu);color:#9b72cf}
.badge-standin{background:var(--bg-bsi);color:#52b788}
.badge-driver{background:var(--bg-bdr);color:#e9c46a}
.badge-custom{background:var(--bg-bcu);color:var(--tlbl)}
.badge-minor{background:var(--bg-bdr);color:#e9c46a;font-size:10px}

/* BUMP TAGS + REUSE */
.bump-tags{display:flex;flex-wrap:wrap;gap:3px}
.bump-tag{background:var(--bg-bt);color:var(--tfnt);font-size:10px;padding:2px 6px;border-radius:3px;border:1px solid var(--br2)}
.reuse-tag{background:var(--bg-rt);color:#3d9e6a;font-size:10px;padding:2px 8px;border-radius:3px;font-weight:700;letter-spacing:0.2px;display:inline-block;text-align:left}
.ot-warn{font-size:10px;color:#e63946;font-weight:700;margin-left:4px}

/* TOTALS BAR */
.totals-bar{background:var(--bg-el);border-top:1px solid var(--br);border-radius:0 0 6px 6px;padding:10px 14px;display:flex;align-items:center;gap:20px;margin-top:0;flex-wrap:wrap}
.total-item{display:flex;align-items:center;gap:5px}
.total-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--tlbl)}
.total-val{font-size:13px;font-weight:700;color:var(--t1)}
.total-val.red{color:#2a7fc4}.total-val.blue{color:#457b9d}.total-val.green{color:#52b788}.total-val.purple{color:#9b72cf}
.sag-warning{font-size:11px;font-weight:700;color:#e63946;background:var(--bg-sw);padding:3px 9px;border-radius:3px;margin-left:auto}
.sag-ok{font-size:11px;font-weight:700;color:#3d9e6a;background:var(--bg-so);padding:3px 9px;border-radius:3px;margin-left:auto}

/* BUMP SELECTOR IN MODAL */
.bump-select-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.bump-list{border:1px solid var(--br4);border-radius:5px;overflow:hidden;margin-top:4px}
.bump-list-item{display:flex;align-items:center;gap:10px;padding:6px 10px;border-bottom:1px solid var(--brb);font-size:12px}
.bump-list-item:last-child{border-bottom:none}
.bump-list-label{flex:1;color:var(--t3)}
.bump-list-amt{color:#52b788;font-weight:700;min-width:50px;text-align:right}
.bump-empty{font-size:12px;color:var(--tfnt);padding:8px 0}

/* MODAL */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;z-index:200;padding:20px}
#modal-overlay.open{display:flex}
.modal-box{background:var(--bg-modal);border:1px solid var(--br);border-radius:10px;width:100%;max-width:660px;max-height:92vh;overflow-y:auto;padding:22px}
.modal-title{font-size:17px;font-weight:800;color:var(--t1);margin-bottom:18px;display:flex;align-items:center;justify-content:space-between}

/* PRINT / EXPORT */
.print-hdr-block{text-align:center;margin-bottom:18px}
.print-show-title{font-size:26px;font-weight:900;text-transform:uppercase;letter-spacing:2px;border-bottom:3px solid #2a7fc4;padding-bottom:8px;margin-bottom:6px}
.print-meta{font-size:13px;color:var(--tfnt);margin-bottom:3px}
.print-legend{font-size:11px;color:var(--tmut);font-style:italic;margin-top:6px}
.print-day{margin-bottom:28px}
.print-day-hdr{background:#2a7fc4;color:#fff;padding:7px 14px;font-weight:900;font-size:14px;display:flex;justify-content:space-between;border-radius:4px 4px 0 0}
.print-table{width:100%;border-collapse:collapse;font-size:12px}
.print-table th{background:var(--bg-pd);padding:6px 10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--tmut);border:1px solid var(--br7)}
.print-table td{padding:6px 10px;border:1px solid var(--br7);vertical-align:middle}
.print-table .row-si td{background:var(--bg-ps);color:#457b9d;font-style:italic}
.print-table .row-scene-hdr td{background:var(--bg-psc);color:var(--tmut);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px}
.print-totals{background:var(--bg-gd);padding:8px 14px;display:flex;gap:24px;font-size:13px;font-weight:700;border:1px solid var(--br4);border-top:none;border-radius:0 0 4px 4px;flex-wrap:wrap}
.grand-totals{background:var(--bg-gd);border:2px solid #2a7fc4;border-radius:6px;padding:16px 20px;margin-top:16px}
.grand-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:16px;margin-bottom:14px}
.grand-item .glbl{font-size:10px;color:var(--tmut);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:2px}
.grand-item .gval{font-size:24px;font-weight:900}
.empty{text-align:center;padding:36px 20px;color:var(--tfnt);font-size:13px}
.empty-icon{font-size:34px;margin-bottom:10px}

/* CHECKBOX STYLE */
.cb-row{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;font-size:13px;color:var(--t3)}
.cb-row input[type=checkbox]{accent-color:#2a7fc4;width:15px;height:15px;cursor:pointer;flex-shrink:0}

/* DIVIDER */
.divider{border:none;border-top:1px solid var(--brd);margin:14px 0}

@media print{
  #nav,.print-hide,button{display:none!important}
  body{background:#fff;color:#000}
  .print-show-title{color:#000;border-bottom-color:#000}
  .print-day-hdr{background:#000!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .print-table th{background:#eee!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;color:#000;border-color:#999}
  .print-table td{border-color:#ccc;color:#000}
  .print-table .row-si td{background:#e8f4ff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;color:#003366}
  .print-table .row-scene-hdr td{background:#f5f5f5!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;color:#333}
  .print-totals,.grand-totals{background:#f9f9f9!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;color:#000;border-color:#999}
  #main{padding:0;max-width:100%}
  .print-day{page-break-inside:avoid}
}
/* ── Saves list ─────────────────────────────────────────── */
.saves-list{display:flex;flex-direction:column;gap:8px;max-height:60vh;overflow-y:auto}
.save-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 14px;background:var(--bg-el);border-radius:6px;border:1px solid var(--br2)}
.save-row-info{flex:1;min-width:0}
.save-row-name{font-size:13px;font-weight:700;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.save-row-meta{font-size:11px;color:var(--tmut);margin-top:2px}
.save-row-actions{display:flex;gap:6px;flex-shrink:0}
/* ── Diff modal ─────────────────────────────────────────── */
.diff-list{max-height:55vh;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
.diff-section{display:flex;flex-direction:column;gap:4px}
.diff-section-hdr{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:4px 0 6px;border-bottom:1px solid var(--br2);margin-bottom:4px}
.diff-row{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;background:var(--bg-ds);border-radius:5px;cursor:pointer;border:1px solid transparent}
.diff-row:hover{border-color:var(--brp)}
.diff-row input[type=checkbox]{margin-top:2px;flex-shrink:0;width:15px;height:15px;accent-color:#3a7bd5}
.diff-row-body{flex:1;min-width:0}
.diff-row-title{font-size:12px;font-weight:700;color:var(--t3);line-height:1.4}
.diff-day-badge{font-size:10px;color:var(--tmut);font-weight:400;margin-left:4px}
.diff-old{font-size:11px;color:#e74c3c;margin-top:3px;font-style:italic}
.diff-note{font-size:10px;color:var(--tfnt);margin-top:3px}
.diff-unchanged{font-size:11px;color:var(--tvfnt);padding:8px 10px;border-top:1px solid var(--bg-th);margin-top:4px}
/* ── Toast ──────────────────────────────────────────────── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#2a7fc4;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:opacity 0.25s,transform 0.25s;pointer-events:none;z-index:9999;white-space:nowrap}
.toast-show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast-error{background:#c0392b}
/* DRAG & DROP SCENES */
.scene-drag-handle{cursor:grab;color:var(--tvfnt);font-size:17px;padding:0 5px 0 2px;user-select:none;flex-shrink:0;line-height:1;transition:color 0.1s}
.scene-drag-handle:hover{color:#5ba4e0}
.scene-drag-handle:active{cursor:grabbing}
.scene-block.drag-over-top{border-top:2px solid #3a90d4!important;margin-top:-2px}
.scene-block.drag-over-bottom{border-bottom:2px solid #3a90d4!important}

<script>
// ══════════════════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════════════════
const BUMP_LIB = [

  {cat:'Wardrobe', id:'w_formal',  label:'Formal evening wear / genuine furs', amt:25},
  {cat:'Wardrobe', id:'w_police',  label:'Police uniform (TV/Theatrical)', amt:36},

  {cat:'Props',    id:'p_tennis',  label:'Tennis racquet', amt:5.50},
  {cat:'Props',    id:'p_luggage', label:'Luggage (per piece)', amt:5.50},
  {cat:'Props',    id:'p_camera',  label:'Camera', amt:5.50},
  {cat:'Props',    id:'p_skis',    label:'Skis and poles', amt:12},
  {cat:'Props',    id:'p_skates',  label:'Skates / skateboard', amt:5.50},

  {cat:'Vehicles', id:'v_moped',   label:'Moped', amt:15},
  {cat:'Vehicles', id:'v_moto',    label:'Motorcycle', amt:37.50},
  {cat:'Vehicles', id:'v_pmoto',   label:'Police motorcycle', amt:50},
  {cat:'Cosmetic', id:'c_bodymk',  label:'Body makeup (>50% of body)', amt:14},
  {cat:'Cosmetic', id:'c_hairgds', label:'Hair goods (spirit gum)', amt:14},
  {cat:'Cosmetic', id:'c_beard',   label:'Own natural beard required', amt:14},
  {cat:'Cosmetic', id:'c_skull',   label:'Skullcap', amt:14},
  {cat:'Cosmetic', id:'c_haircut', label:'Haircut required', amt:14},
  {cat:'Hazardous',id:'h_rain',    label:'Artificial rain', amt:14},
  {cat:'Hazardous',id:'h_smoke',   label:'Smoke exposure', amt:14},
  {cat:'Hazardous',id:'h_hazard',  label:'Hazardous work (NETCODE)', amt:100},
  {cat:'Hazardous',id:'h_wet',     label:'Wet or snow work', amt:14},
  {cat:'Special',  id:'s_photodbl',label:'Photo double (rate upgrade)', amt:0},
  {cat:'Special',  id:'s_fitting', label:'Costume fitting', amt:0},
];
const BUMP_MAP = Object.fromEntries(BUMP_LIB.map(b=>[b.id,b]));
const BUMP_CATS = [...new Set(BUMP_LIB.map(b=>b.cat))];

const RATE_TIERS = [
  {id:'sag',      label:'SAG',              def:182},
  {id:'sag_hi',   label:'SAG (Hi Rate)',    def:120},
  {id:'nonunion', label:'Non-Union',        def:120},
  {id:'standin',  label:'Stand-In',         def:214},
  {id:'driver',   label:'Precision Driver', def:400},
  {id:'custom',   label:'Custom Rate',      def:0},
];
const RATE_MAP = Object.fromEntries(RATE_TIERS.map(r=>[r.id,r]));

const CONTRACT_TYPES = [
  {id:'tv',         label:'TV — SAG Basic Agreement',        sagMin:25},
  {id:'theatrical', label:'Theatrical — SAG Basic Agreement',sagMin:85},
  {id:'lowbudget',  label:'Low Budget / Modified Agreement', sagMin:0},
  {id:'custom',     label:'Custom',                          sagMin:0},
];

// ══════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════
function defaultState(){
  return {
    show:{name:'',episode:'',version:'1',preparedBy:'',role:'',contractType:'tv',sagMin:25,isSeries:false},
    standins:[],
    days:[]
  };
}
let state=(()=>{try{const s=localStorage.getItem('bgboard');return s?JSON.parse(s):defaultState();}catch(e){return defaultState();}})();
// Migrate old state fields
if(!state.show.contractType) state.show.contractType='tv';
if(state.show.sagMin===undefined) state.show.sagMin=25;
if(state.show.role===undefined) state.show.role='';
if(state.show.isSeries===undefined) state.show.isSeries=false;
if(state.show.showCost===undefined) state.show.showCost=true;

let currentTab='breakdown';
let expandedDays={};
// Active save tracking
let _saveId=null, _saveName=null;

function save(){try{localStorage.setItem('bgboard',JSON.stringify(state));}catch(e){}}

// ══════════════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════════════
function uid(){return Math.random().toString(36).slice(2,10);}

function calcPay(baseRate,hours,bumps){
  baseRate=parseFloat(baseRate)||0; hours=parseFloat(hours)||0;
  const hr=baseRate/8;
  let pay=baseRate;
  if(hours>8&&hours<=12) pay+=(hours-8)*hr*1.5;
  else if(hours>12){pay+=4*hr*1.5;pay+=(hours-12)*hr*2;}
  (bumps||[]).forEach(b=>pay+=parseFloat(b.amt)||0);
  return pay;
}

function $m(n){return '$'+n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');}

function fmtDate(d){
  if(!d) return '';
  try{const dt=new Date(d+'T12:00:00');return dt.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});}
  catch(e){return d;}
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function getDayStats(day){
  let sag=0,nu=0,cost=0;
  day.scenes.forEach(sc=>(sc.roles||[]).forEach(r=>{
    const n=parseInt(r.count)||1;
    if(r.tier==='nonunion') nu+=n; else sag+=n;
    cost+=calcPay(r.baseRate,r.hours,r.bumps)*n;
  }));
  const globalSiCount=state.standins.filter(si=>!(day.standinOff||{})[si.id]).length;
  const daySiCount=(day.dayStandins||[]).length;
  const siCount=globalSiCount+daySiCount;
  return {sag,nu,siCount,cost};
}

function getSIHours(day,si){
  if((day.standinOff||{})[si.id]) return null; // off
  const h=(day.standinHours||{})[si.id];
  return h!==undefined?Math.max(8,h):Math.max(8,si.defaultHours||8);
}

function reuseInfo(roleType,excludeSceneId){
  const matches=[];
  if(!roleType||!roleType.trim()) return matches;
  const q=roleType.trim().toLowerCase();
  state.days.forEach(day=>{
    day.scenes.forEach(sc=>{
      if(sc.id===excludeSceneId) return;
      (sc.roles||[]).forEach(r=>{
        if((r.type||'').trim().toLowerCase()===q) matches.push(sc.sceneId||sc.set||'Sc');
      });
    });
  });
  return [...new Set(matches)];
}

function sagMinWarning(day,stats){
  const min=parseInt(state.show.sagMin)||0;
  if(min===0||stats.nu===0) return null;
  if(stats.sag<min) return `⚠ SAG minimum not met — need ${min-stats.sag} more SAG (min: ${min})`;
  return null;
}

// ══════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════
function render(){
  updateNavInfo(); updateNavTabs();
  document.getElementById('main').innerHTML=
    currentTab==='setup'?renderSetup():currentTab==='breakdown'?renderBreakdown():renderExport();
  attachDayToggles();
}

function updateNavInfo(){
  const el=document.getElementById('nav-info');
  const savePart=_saveName
    ?`<span style="color:#3a7bd5;font-weight:700">${esc(_saveName)}</span>`
    :'<span style="color:var(--tfnt);font-style:italic">unsaved</span>';
  el.innerHTML=`<span style="font-size:12px">${savePart}</span>`;
}
function updateNavTabs(){
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===currentTab));
}
function attachDayToggles(){
  document.querySelectorAll('.day-hdr').forEach(hdr=>{
    hdr.addEventListener('click',e=>{
      if(e.target.closest('button')&&!e.target.classList.contains('day-toggle-btn')) return;
      const id=hdr.dataset.dayId;
      expandedDays[id]=!expandedDays[id];
      const body=document.getElementById('day-body-'+id);
      const tog=document.getElementById('day-tog-'+id);
      if(body) body.classList.toggle('open',expandedDays[id]);
      if(tog)  tog.textContent=expandedDays[id]?'▼':'▶';
    });
  });
  attachDragHandlers();
}

// ══════════════════════════════════════════════════════════
// DRAG & DROP — Scene reordering within a day
// ══════════════════════════════════════════════════════════
let _dragSceneId=null,_dragDayId=null;

function attachDragHandlers(){
  document.querySelectorAll('.scene-block[draggable]').forEach(block=>{
    block.addEventListener('dragstart',e=>{
      // Don't drag if clicking a button or input inside
      if(e.target.closest('button')||e.target.closest('input')||e.target.closest('select')) {
        e.preventDefault(); return;
      }
      _dragSceneId=block.dataset.sceneId;
      _dragDayId=block.dataset.dayId;
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/plain',_dragSceneId);
      setTimeout(()=>block.classList.add('dragging'),0);
    });
    block.addEventListener('dragend',()=>{
      block.classList.remove('dragging');
      document.querySelectorAll('.scene-block').forEach(b=>
        b.classList.remove('drag-over-top','drag-over-bottom'));
      _dragSceneId=null; _dragDayId=null;
    });
    block.addEventListener('dragover',e=>{
      if(!_dragSceneId) return;
      e.preventDefault();
      e.dataTransfer.dropEffect='move';
      const rect=block.getBoundingClientRect();
      const midY=rect.top+rect.height/2;
      document.querySelectorAll('.scene-block').forEach(b=>
        b.classList.remove('drag-over-top','drag-over-bottom'));
      block.classList.add(e.clientY<midY?'drag-over-top':'drag-over-bottom');
    });
    block.addEventListener('dragleave',e=>{
      if(!e.relatedTarget||!block.contains(e.relatedTarget))
        block.classList.remove('drag-over-top','drag-over-bottom');
    });
    block.addEventListener('drop',e=>{
      e.preventDefault();
      const targetSceneId=block.dataset.sceneId;
      const targetDayId=block.dataset.dayId;
      block.classList.remove('drag-over-top','drag-over-bottom');
      if(!_dragSceneId||_dragSceneId===targetSceneId) return;
      if(_dragDayId!==targetDayId){
        showToast('Drag scenes within the same day to reorder','error'); return;
      }
      const day=state.days.find(d=>d.id===_dragDayId);
      if(!day) return;
      const fromIdx=day.scenes.findIndex(s=>s.id===_dragSceneId);
      let toIdx=day.scenes.findIndex(s=>s.id===targetSceneId);
      if(fromIdx<0||toIdx<0) return;
      const rect=block.getBoundingClientRect();
      const dropBefore=e.clientY<(rect.top+rect.height/2);
      const [moved]=day.scenes.splice(fromIdx,1);
      toIdx=day.scenes.findIndex(s=>s.id===targetSceneId);
      day.scenes.splice(dropBefore?toIdx:toIdx+1,0,moved);
      save(); render();
      showToast('Scene reordered');
    });
  });
}

// ══════════════════════════════════════════════════════════
// SETUP PAGE
// ══════════════════════════════════════════════════════════
function renderSetup(){
  const s=state.show;
  const ct=CONTRACT_TYPES.find(c=>c.id===s.contractType)||CONTRACT_TYPES[0];
  const contractOpts=CONTRACT_TYPES.map(c=>`<option value="${c.id}" ${s.contractType===c.id?'selected':''}>${c.label}</option>`).join('');

  const siList=state.standins.map(si=>`
    <div class="si-item">
      <div style="min-width:160px">
        <div class="si-name">${esc(si.name)}</div>
        <div style="font-size:11px;color:var(--tmut)">${esc(si.character||'—')}</div>
      </div>
      <div style="flex:1;font-size:12px;color:var(--tmut)">covers: <strong style="color:var(--t2)">${esc(si.character||'—')}</strong></div>

      <button class="btn btn-danger btn-sm" onclick="deleteStandin('${si.id}')">Remove</button>

  const roleOpts=['','1st AD','2nd AD','2nd 2nd AD','UPM'].map(r=>`<option value="${r}" ${(s.role||'')==r?'selected':''}>${r||'— select —'}</option>`).join('');

    <div class="card-title"><span><span class="accent">◆</span> Show Information</span></div>
    <div class="fg g3">
      <div class="form-group">
        <label class="lbl">Show Name</label>
        <input class="inp" value="${esc(s.name)}" placeholder="" oninput="updateShow('name',this.value)">
      </div>
      <div class="form-group">
        <label class="lbl">Episode #</label>
        <input class="inp" value="${esc(s.episode)}" placeholder="" oninput="updateShow('episode',this.value)">
      </div>
      <div class="form-group">
        <label class="lbl">Version</label>
        <input class="inp" value="${esc(s.version)}" placeholder="" oninput="updateShow('version',this.value)">
      </div>
    </div>
    <div class="fg g2">
      <div class="form-group">
        <label class="lbl">Prepared By</label>
        <input class="inp" value="${esc(s.preparedBy)}" placeholder="" oninput="updateShow('preparedBy',this.value)">
      </div>
      <div class="form-group">
        <label class="lbl">Role</label>
        <select class="sel" onchange="updateShow('role',this.value)">${roleOpts}</select>
      </div>
      <div class="form-group">
        <label class="lbl">Production Type</label>
        <label style="display:flex;align-items:center;gap:8px;margin-top:6px;cursor:pointer">
          <input type="checkbox" ${s.isSeries?'checked':''} onchange="updateShow('isSeries',this.checked)" style="width:16px;height:16px;accent-color:#3a7bd5">
          <span style="font-size:13px;color:var(--tlbl)">TV Series <span style="color:var(--tmut);font-size:11px">(enables standin carry-over when duplicating episodes)</span></span>
        </label>
      </div>
    </div>
  </div>

  <div class="card setup-card">
    <div class="card-title"><span><span class="accent">◆</span> SAG-AFTRA Contract</span></div>
    <div class="fg g2">
      <div class="form-group">
        <label class="lbl">Contract Type</label>
        <select class="sel" onchange="onContractChange(this.value)">${contractOpts}</select>
      </div>
      <div class="form-group">
        <label class="lbl">SAG Minimum (BG before Non-Union allowed)</label>
        <input class="inp" id="sag-min-input" type="number" min="0" value="${s.sagMin}" oninput="updateShow('sagMin',parseInt(this.value)||0)">
      </div>
    </div>
    <div class="contract-box">
      <div class="rule">
        <strong>Rule:</strong> The first <strong>${s.sagMin}</strong> background actors each shooting day must be SAG-AFTRA covered before any Non-Union extras may be hired.<br>
        <strong>Stand-ins</strong> are always SAG and are counted separately — they do not apply toward the BG minimum.<br>
        ${s.contractType==='lowbudget'||s.contractType==='custom'?'<span style="color:#e9c46a">⚠ Verify minimum requirements with your specific contract.</span>':''}
      </div>
    </div>
  </div>

  <div class="card setup-card">
    <div class="card-title">
      <span><span class="accent">◆</span> Stand-Ins Roster</span>
      <button class="btn btn-primary btn-sm" onclick="openStandinModal(null)">+ Add Stand-In</button>
    </div>
    ${state.standins.length===0?`<div style="font-size:12px;color:var(--tfnt);padding:4px 0 8px;font-style:italic">No recurring stand-ins yet.</div>`:''}
    ${siList}
    <div class="hint" style="margin-top:8px">Stand-ins are assumed working every day. Mark them OFF in the Breakdown per day as needed.</div>
  </div>
  <div class="card setup-card" style="margin-top:18px">
    <div class="card-title"><span><span class="accent">◆</span> Preferences</span></div>
    <label class="cb-row">
      <input type="checkbox" ${s.showCost!==false?'checked':''} onchange="updateShow('showCost',this.checked)">
      Show estimated cost in day header and totals bar
    </label>
    <div style="display:flex;align-items:center;gap:10px;margin-top:14px;padding-top:12px;border-top:1px solid var(--br)">
      <span style="font-size:13px;color:var(--tlbl)">Appearance</span>
      <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn" title="Toggle light/dark mode">${document.documentElement.dataset.theme==='light'?'☀ Light':'☾ Dark'}</button>
    </div>
    <div id="usage-counter" style="margin-top:14px;padding-top:12px;border-top:1px solid var(--br);font-size:11px;color:var(--tvfnt);letter-spacing:0.08em">
      ${state._usageCount != null ? `sessions: ${state._usageCount}` : ''}
    </div>
  </div>`;
}

function updateShow(key,val){state.show[key]=val;save();updateNavInfo();}

function onContractChange(val){
  const ct=CONTRACT_TYPES.find(c=>c.id===val)||CONTRACT_TYPES[0];
  state.show.contractType=val;
  state.show.sagMin=ct.sagMin;
  save(); render();
}

function deleteStandin(id){
  if(!confirm('Remove this stand-in?')) return;
  state.standins=state.standins.filter(s=>s.id!==id);
  save(); render();
}

// ══════════════════════════════════════════════════════════
// BREAKDOWN PAGE
// ══════════════════════════════════════════════════════════
function renderBreakdown(){
  const addForm=`
    <div class="card" id="add-day-card" style="display:none;margin-bottom:16px">
      <div class="card-title"><span class="accent">◆</span> New Shooting Day</div>
      <div class="fg g3">

        </div>
        <div class="form-group">
          <label class="lbl">Date</label>
          <input class="inp" id="new-day-date" type="date">
        </div>
        <div class="form-group" style="justify-content:flex-end">
          <label class="lbl">&nbsp;</label>
          <div style="display:flex;gap:8px">
            <button class="btn btn-secondary" onclick="document.getElementById('add-day-card').style.display='none'">Cancel</button>
            <button class="btn btn-primary" onclick="addDay()">Add Day</button>
          </div>
        </div>
      </div>
    </div>`;

  const dayBlocks=state.days.map(day=>{
    const stats=getDayStats(day);
    if(expandedDays[day.id]===undefined) expandedDays[day.id]=true;
    const expanded=expandedDays[day.id];
    const warn=sagMinWarning(day,stats);

    // Standins section — always show so "+ Day SI" is always accessible
    const siSection=`
      <div class="si-section">
        <div class="si-section-lbl" style="display:flex;align-items:center;justify-content:space-between">
          <span>Stand-Ins</span>
          <button class="btn btn-secondary btn-xs" onclick="openDayStandinModal('${day.id}',null)" style="font-size:10px;padding:2px 8px">+ Day SI</button>
        </div>
        ${state.standins.map(si=>{
          const off=!!(day.standinOff||{})[si.id];
          const hrs=getSIHours(day,si);
          return `<div class="si-day-row">
            <span class="si-day-name">${esc(si.name)}</span>
            <span class="si-day-char">${esc(si.character)}</span>
            <span style="font-size:11px;color:var(--tmut)">$${si.rate}/8</span>
            <label class="si-off-toggle">
              <input type="checkbox" ${off?'':'checked'} onchange="toggleSIOff('${day.id}','${si.id}',!this.checked)">
              Working
            </label>
            <input class="si-hrs-input" type="number" min="8" max="24" step="0.5"
              value="${off?si.defaultHours:hrs}" ${off?'disabled':''}
              onchange="updateSIHours('${day.id}','${si.id}',this.value)"
              title="Hours this day (minimum 8)">
          </div>`;
        }).join('')}
        ${(day.dayStandins||[]).map(si=>`
          <div class="si-day-row" style="grid-template-columns:160px 1fr 70px 90px 52px 26px">
            <span class="si-day-name">${esc(si.name)}<span class="badge-day-si">DAY</span></span>
            <span class="si-day-char">${esc(si.character||'—')}</span>
            <span style="font-size:11px;color:var(--tmut)">$${si.rate}/8</span>
            <span class="si-working on">Working</span>
            <input class="si-hrs-input" type="number" min="8" max="24" step="0.5"
              value="${si.hours||12}"
              onchange="updateDaySIHours('${day.id}','${si.id}',this.value)"
              title="Hours this day">

function addDay(){
  const num=document.getElementById('new-day-num').value;
  if(!num){alert('Day number required');return;}
  const id=uid();
  state.days.push({id,dayNumber:parseInt(num),date:document.getElementById('new-day-date').value,scenes:[],standinOff:{},standinHours:{}});
  state.days.sort((a,b)=>a.dayNumber-b.dayNumber);
  expandedDays[id]=true;
  save();render();
}
function deleteDay(id){if(!confirm('Delete this day and all scenes?'))return;state.days=state.days.filter(d=>d.id!==id);save();render();}
function deleteScene(dayId,sceneId){if(!confirm('Delete this scene?'))return;const d=state.days.find(x=>x.id===dayId);if(d)d.scenes=d.scenes.filter(s=>s.id!==sceneId);save();render();}
function deleteRole(dayId,sceneId,roleId){const d=state.days.find(x=>x.id===dayId);const s=d?.scenes.find(x=>x.id===sceneId);if(s)s.roles=(s.roles||[]).filter(r=>r.id!==roleId);save();render();}

function toggleSIOff(dayId,siId,isOff){
  const day=state.days.find(d=>d.id===dayId);if(!day)return;
  if(!day.standinOff) day.standinOff={};
  day.standinOff[siId]=isOff;
  save();render();
}
function updateSIHours(dayId,siId,val){
  const day=state.days.find(d=>d.id===dayId);if(!day)return;
  if(!day.standinHours) day.standinHours={};
  day.standinHours[siId]=Math.max(8,parseFloat(val)||8);
  save();
}

function saveScene(dayId,sceneId){
  const set=document.getElementById('sc-set').value.trim();
  if(!set){alert('Set/Location required');return;}
  const day=state.days.find(d=>d.id===dayId);if(!day)return;
  const rawId=document.getElementById('sc-id').value.trim();
  const desc=document.getElementById('sc-desc').value.trim();
  // Bulk create: comma-separated IDs in add mode
  if(!sceneId&&rawId.includes(',')){
    const ids=rawId.split(',').map(s=>s.trim()).filter(Boolean);
    ids.forEach(id=>{
      if(!day.scenes.find(s=>s.sceneId===id))
        day.scenes.push({id:uid(),sceneId:id,set,desc,roles:[]});
    });
    save();closeModal();render();return;
  }
  const sc={id:sceneId||uid(),sceneId:rawId,set,desc,roles:[]};
  if(sceneId){const ex=day.scenes.find(s=>s.id===sceneId);if(ex)sc.roles=ex.roles||[];}
  day.scenes=day.scenes.filter(s=>s.id!==sceneId);
  day.scenes.push(sc);
  save();closeModal();render();
}

function saveBulkScenes(dayId){
  const raw=document.getElementById('bulk-ids').value;

  if(!raw.trim()){alert('Enter at least one scene number');return;}
  const day=state.days.find(d=>d.id===dayId);if(!day)return;

}

// ── QUICK BG ENTRY ────────────────────────────────────────────────────────────
// Parse plain-text BG entries like "(10) Doctors 12hrs, (8) Nurses"
function parseQuickBGText(text){
  const roles=[];
  // Split on newlines or semicolons
  const lines=text.split(/[\n;]+/).map(l=>l.trim()).filter(Boolean);
  for(const line of lines){
    // Each line: (n) description [Nh] OR n description [Nh]
    let m=line.match(/^\((\d+)\)\s+(.+)/);
    if(!m) m=line.match(/^(\d+)\s+(.+)/);
    if(!m) continue;
    const count=parseInt(m[1]);
    let rest=m[2].trim();
    // Extract hours: "12h", "12hrs", "for 12h", "for 12hrs"
    let hours=8;
    const hm=rest.match(/(?:for\s+)?(\d+(?:\.\d+)?)\s*h(?:rs?)?/i);
    if(hm){
      hours=parseFloat(hm[1]);
      rest=rest.replace(hm[0],'').trim().replace(/\s+/g,' ');
    }
    const type=rest.replace(/^for\s+/i,'').trim();
    if(type) roles.push({id:uid(),type,count,tier:'sag',baseRate:182,hours,bumps:[],notes:'',minors:false});
  }
  return roles;
}

      if(roles.length) prev.innerHTML='Will add: '+roles.map(r=>`<span style="color:#5ba4e0">${esc(r.type)} ×${r.count}</span>`).join(' · ');

function saveQuickBG(dayId){
  const day=state.days.find(d=>d.id===dayId);if(!day)return;
  const text=document.getElementById('qbg-text').value;
  const defaultHours=parseFloat(document.getElementById('qbg-hours')?.value)||8;
  let roles=parseQuickBGText(text);
  if(!roles.length){alert('No valid BG entries found.\nFormat: (10) Doctors 12hrs');return;}
  // Apply default hours to any role that got the standard 8h
  roles=roles.map(r=>r.hours===8?{...r,hours:defaultHours}:r);

  const sceneEl=document.getElementById('qbg-scene');
  let sceneId=sceneEl?.value||'';
  let sc=day.scenes.find(s=>s.id===sceneId);
  if(!sc){
    // Create a General scene
    sc={id:uid(),sceneId:'General',set:'General BG',desc:'',roles:[]};
    day.scenes.push(sc);
  }
  sc.roles.push(...roles);
  save();closeModal();render();
}

function onTierChange(val){

function updatePay(){
  const rate=parseFloat(document.getElementById('r-rate')?.value)||0;
  const hrs=parseFloat(document.getElementById('r-hours')?.value)||0;
  const cnt=parseInt(document.getElementById('r-count')?.value)||1;
  const pay=calcPay(rate,hrs,_bumps);
  const el=document.getElementById('pay-preview');if(!el)return;
  const ot=hrs>8,dt=hrs>12;
  el.innerHTML=`<span style="color:var(--tmut);font-size:11px">Per person:</span>
    <strong style="color:#52b788;font-size:15px;margin:0 8px">${$m(pay)}</strong>
    <span style="color:var(--tmut)">× ${cnt} =</span>
    <strong style="color:#52b788;margin-left:6px">${$m(pay*cnt)}</strong>
    ${ot?`<span style="color:#e63946;font-size:11px;font-weight:700;margin-left:10px">⚠ OT after 8hrs${dt?' · DT after 12hrs':''}</span>`:''}`;

function addPresetBump(){
  const sel=document.getElementById('bump-picker');
  const id=sel.value;if(!id)return;
  if(_bumps.find(b=>b.id===id)){sel.value='';return;}
  const b=BUMP_MAP[id];
  _bumps.push({id,label:b.label,amt:b.amt});
  sel.value='';renderBumpsList();updatePay();
}

function addCustomBump(){
  const lbl=document.getElementById('custom-bump-lbl').value.trim();
  const amt=parseFloat(document.getElementById('custom-bump-amt').value)||0;
  if(!lbl){alert('Description required');return;}
  _bumps.push({id:'c_'+uid(),label:lbl,amt,custom:true});
  document.getElementById('custom-bump-lbl').value='';
  document.getElementById('custom-bump-amt').value='';
  renderBumpsList();updatePay();
}

function removeBump(id){
  _bumps=_bumps.filter(b=>b.id!==id);
  renderBumpsList();updatePay();
}

function renderBumpsList(){
  const el=document.getElementById('bumps-list');if(!el)return;
  if(!_bumps.length){el.innerHTML=`<div class="bump-empty">No bumps added</div>`;return;}
  el.innerHTML=`<div class="bump-list">${_bumps.map(b=>`
    <div class="bump-list-item">
      <span class="bump-list-label">${esc(b.label)}</span>
      <span class="bump-list-amt">${b.amt>0?'+$'+b.amt.toFixed(2):''}</span>

function saveRole(dayId,sceneId,roleId){

  const role={
    id:roleId||uid(), type,
    count:parseInt(document.getElementById('r-count').value)||1,
    tier:document.getElementById('r-tier').value,
    baseRate:parseFloat(document.getElementById('r-rate').value)||0,
    hours:Math.max(8,parseFloat(document.getElementById('r-hours').value)||8),

    notes:document.getElementById('r-notes').value.trim(),

  const name=document.getElementById('dsi-name').value.trim();

  const day=state.days.find(d=>d.id===dayId);if(!day)return;
  if(!day.dayStandins) day.dayStandins=[];
  const si={
    id:siId||uid(),
    name,
    character:document.getElementById('dsi-char').value.trim(),
    rate:parseFloat(document.getElementById('dsi-rate').value)||214,
    hours:Math.max(8,parseFloat(document.getElementById('dsi-hrs').value)||12)
  };
  day.dayStandins=day.dayStandins.filter(s=>s.id!==si.id);
  day.dayStandins.push(si);
  save();closeModal();render();
}

function deleteDayStandin(dayId,siId){
  const day=state.days.find(d=>d.id===dayId);if(!day)return;
  day.dayStandins=(day.dayStandins||[]).filter(s=>s.id!==siId);
  save();render();
}

function updateDaySIHours(dayId,siId,val){
  const day=state.days.find(d=>d.id===dayId);if(!day)return;
  const si=(day.dayStandins||[]).find(s=>s.id===siId);
  if(si) si.hours=Math.max(8,parseFloat(val)||8);
  save();
}

async function doSave(){
  const inp=document.getElementById('save-name-inp');
  const name=(inp?.value||'').trim()||_saveLabel();
  closeModal();
  const id=_saveId||Math.random().toString(36).slice(2,10);
  const body={id, name, savedAt:_nowISO(), state};
  try{
    const res=await fetch('/saves',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});

async function loadSave(id){

async function doDuplicate(originalId){

async function deleteSave(id){
  if(!confirm('Delete this save? This cannot be undone.')) return;
  try{
    const res=await fetch(`/saves/${id}`,{method:'DELETE'});
    const j=await res.json();
    if(j.ok){
      const row=document.getElementById('saverow-'+id);
      if(row) row.remove();
      showToast('Save deleted');
      if(_saveId===id){_saveId=null;_saveName=null;updateNavInfo();}
    } else showToast('Delete failed','error');
  }catch(e){ showToast('Delete failed','error'); }
}

// ── Toast notification ────────────────────────────────────
function showToast(msg, type='success'){
  const t=document.getElementById('toast');
  if(!t) return;
  t.textContent=msg;
  t.className='toast toast-'+type+' toast-show';
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.classList.remove('toast-show'),2800);
}

function exportJSON(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`BGBoard_${state.show.episode||'export'}_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}
function importJSON(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{try{state=JSON.parse(ev.target.result);save();render();alert('Imported.');}catch(e){alert('Invalid file.');}};
  r.readAsText(f);e.target.value='';
}

// ── PDF IMPORT ────────────────────────────────────────────────────────────────
// Use relative URL so this works both locally (via bgboard_server.py)
// and when hosted on Railway or any other server.
const PDF_ENDPOINT='/parse-pdf';
const SCHEDULE_ENDPOINT='/parse-schedule';
let _pdfServerAvailable=null;

function fetchWithTimeout(url, opts, ms){
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),ms);
  return fetch(url,{...opts,signal:ctrl.signal}).finally(()=>clearTimeout(tid));
}

async function checkPdfServer(){
  if(_pdfServerAvailable!==null) return _pdfServerAvailable;
  // On file:// there's no server; on http:// there always is
  if(location.protocol==='file:'){_pdfServerAvailable=false;updatePdfBtn();return false;}
  _pdfServerAvailable=true;
  updatePdfBtn();
  return true;
}

function updatePdfBtn(){
  const btn=document.getElementById('pdf-import-btn');
  if(!btn)return;
  if(_pdfServerAvailable===false){
    btn.style.opacity='0.45';
    btn.title='PDF import requires the server.\nRun: python3 bgboard_server.py';
  } else {
    btn.style.opacity='1';
    btn.title='Import a Movie Magic Scheduling PDF shootsked';
  }
}

// ══════════════════════════════════════════════════════════
// DIFF-MERGE
// ══════════════════════════════════════════════════════════

function _applyFreshImport(s){
  state=s;
  if(state.show.isSeries===undefined) state.show.isSeries=false;
  _saveId=null; _saveName=null;
  save(); currentTab='breakdown'; render(); updateNavInfo();
  showToast(`Imported: ${s.days.length} days`);
}

function _sceneKey(id){ return (id||'').trim().toLowerCase(); }

function computeDiff(current, incoming){
  // Build lookup: sceneKey → {scene, day} for current breakdown
  const curMap={};
  current.days.forEach(day=>{
    (day.scenes||[]).forEach(sc=>{
      curMap[_sceneKey(sc.sceneId)]={scene:sc, day};
    });
  });

  // Build lookup for incoming schedule
  const newMap={};
  incoming.days.forEach(day=>{
    (day.scenes||[]).forEach(sc=>{
      newMap[_sceneKey(sc.sceneId)]={scene:sc, day};
    });
  });

  const added=[], removed=[], moved=[], changed=[], unchanged=[];

  // Check every scene in the incoming schedule
  for(const [key, {scene:nSc, day:nDay}] of Object.entries(newMap)){
    if(!curMap[key]){
      added.push({sceneId:nSc.sceneId, scene:nSc, day:nDay});
    } else {
      const {scene:cSc, day:cDay}=curMap[key];
      const dayMoved = cDay.dayNumber !== nDay.dayNumber;
      const setChanged = (cSc.set||'').trim() !== (nSc.set||'').trim();
      const descChanged = (cSc.desc||'').trim() !== (nSc.desc||'').trim();
      if(dayMoved){
        moved.push({sceneId:nSc.sceneId, scene:nSc, newDay:nDay, oldDay:cDay, curScene:cSc});
      } else if(setChanged||descChanged){
        changed.push({sceneId:nSc.sceneId, scene:nSc, day:nDay, curScene:cSc, setChanged, descChanged, oldSet:cSc.set, oldDesc:cSc.desc});
      } else {
        unchanged.push(nSc.sceneId);
      }
    }
  }

  // Scenes in current that are NOT in the incoming schedule
  for(const [key, {scene:cSc, day:cDay}] of Object.entries(curMap)){
    if(!newMap[key]){
      removed.push({sceneId:cSc.sceneId, scene:cSc, day:cDay});
    }
  }

  return {added, removed, moved, changed, unchanged,
          totalChanges: added.length+removed.length+moved.length+changed.length};
}

function showDiffModal(diff, incoming){
  if(diff.totalChanges===0){
    openModal(`
      <div class="modal-title">📋 No Changes Found</div>
      <p style="color:var(--tfnt);margin:16px 0">The new schedule matches your current breakdown — no scenes were added, removed, or changed.</p>
      <div style="text-align:right"><button class="btn btn-ghost" onclick="closeModal()">OK</button></div>`);
    return;
  }

  const s=incoming.show;
  const showLabel=`${s.name||''}${s.episode?' · Ep '+s.episode:''}`;

  function diffSection(items, type){
    if(!items.length) return '';
    const labels={
      added:'NEW — will be added',
      removed:'DROPPED from schedule',
      moved:'MOVED to different day',
      changed:'LOCATION / DESC CHANGED'
    };
    const color={added:'#2ecc71',removed:'#e74c3c',moved:'#e9c46a',changed:'#3a7bd5'};
    const rows=items.map((item,i)=>{
      const id=`diff-${type}-${i}`;
      const dayLabel=item.day?.date||item.newDay?.date||'';
      const dayNum=item.day?.dayNumber??item.newDay?.dayNumber??'';
      let detail='';
      if(type==='changed'){
        if(item.setChanged) detail+=`<div class="diff-old">was: ${esc(item.oldSet)}</div>`;
        if(item.descChanged) detail+=`<div class="diff-old">desc was: ${esc(item.oldDesc||'—')}</div>`;
        detail+=`<div class="diff-note">Your BG roles, bumps & notes are preserved</div>`;
      }
      if(type==='moved'){
        detail+=`<div class="diff-old">was: Day ${item.oldDay.dayNumber} (${item.oldDay.date||''})</div>`;
      }
      if(type==='removed'){
        detail+=`<div class="diff-note">Uncheck to keep in your breakdown</div>`;
      }
      return `<label class="diff-row" for="${id}">
        <input type="checkbox" id="${id}" data-diff-type="${type}" data-diff-idx="${i}" checked onchange="updateDiffCount()">
        <div class="diff-row-body">
          <div class="diff-row-title">Sc ${esc(item.sceneId)} &nbsp;<span style="color:var(--tfnt);font-weight:400">${esc(item.scene?.set||item.curScene?.set||'')}</span> <span class="diff-day-badge">Day ${dayNum}${dayLabel?' · '+dayLabel:''}</span></div>
          ${detail}
        </div>
      </label>`;
    }).join('');

    return `<div class="diff-section">
      <div class="diff-section-hdr" style="color:${color[type]}">${labels[type]} (${items.length})</div>
      ${rows}
    </div>`;
  }

  const unchangedNote=diff.unchanged.length
    ?`<div class="diff-unchanged">${diff.unchanged.length} scene${diff.unchanged.length!==1?'s':''} unchanged — your data fully preserved</div>`:'';

  const html=`
    <div class="modal-title">📋 New Draft — Review Changes</div>
    <div style="font-size:12px;color:var(--tvfnt);margin-bottom:14px">${esc(showLabel)} &nbsp;·&nbsp; ${incoming.days.length} days &nbsp;·&nbsp; ${(incoming.days||[]).reduce((n,d)=>n+(d.scenes?.length||0),0)} scenes</div>
    <div class="diff-list" id="diff-list">
      ${diffSection(diff.added,'added')}
      ${diffSection(diff.removed,'removed')}
      ${diffSection(diff.moved,'moved')}
      ${diffSection(diff.changed,'changed')}
      ${unchangedNote}
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:16px">
      <button class="btn btn-danger" onclick="closeModal()">Cancel — keep current</button>
      <button class="btn btn-primary" id="diff-apply-btn" onclick="applyDiff(diffPayload)">Apply <span id="diff-count">${diff.totalChanges}</span> Changes</button>
    </div>`;

  // Store diff+incoming for the apply function
  window.diffPayload={diff, incoming};
  openModal(html);
}

function updateDiffCount(){
  const checked=document.querySelectorAll('#diff-list input[type=checkbox]:checked').length;
  const btn=document.getElementById('diff-apply-btn');
  const cnt=document.getElementById('diff-count');
  if(cnt) cnt.textContent=checked;
  if(btn) btn.disabled=checked===0;
}

function applyDiff({diff, incoming}){
  // Deep clone current state as base
  const next=JSON.parse(JSON.stringify(state));

  // Collect which items are checked by type+index
  function isChecked(type, idx){
    const el=document.getElementById(`diff-${type}-${idx}`);
    return el?el.checked:true;
  }

  // Helper: find or create a day in next by dayNumber
  function findOrCreateDay(dayNumber, templateDay){
    let d=next.days.find(x=>x.dayNumber===dayNumber);
    if(!d){
      d={id:uid(), dayNumber, date:templateDay.date||'', scenes:[], standinOff:{}, standinHours:{}};
      next.days.push(d);
      next.days.sort((a,b)=>a.dayNumber-b.dayNumber);
    }
    return d;
  }

  // ADDED: insert new scenes (with their imported roles)
  diff.added.forEach((item,i)=>{
    if(!isChecked('added',i)) return;
    const day=findOrCreateDay(item.day.dayNumber, item.day);
    day.scenes.push(JSON.parse(JSON.stringify(item.scene)));
  });

  // REMOVED: delete scenes from current state
  diff.removed.forEach((item,i)=>{
    if(!isChecked('removed',i)) return;
    const key=_sceneKey(item.sceneId);
    next.days.forEach(d=>{ d.scenes=d.scenes.filter(sc=>_sceneKey(sc.sceneId)!==key); });
  });

  // MOVED: move scene to new day (keep existing roles/notes)
  diff.moved.forEach((item,i)=>{
    if(!isChecked('moved',i)) return;
    const key=_sceneKey(item.sceneId);
    let movedScene=null;
    // Remove from old day
    next.days.forEach(d=>{
      const idx=d.scenes.findIndex(sc=>_sceneKey(sc.sceneId)===key);
      if(idx>=0){ movedScene=d.scenes.splice(idx,1)[0]; }
    });
    if(movedScene){
      movedScene.set=item.scene.set; // update location too
      const newDay=findOrCreateDay(item.newDay.dayNumber, item.newDay);
      newDay.scenes.push(movedScene);
    }
  });

  // CHANGED: update set/desc only — keep all roles, bumps, notes intact
  diff.changed.forEach((item,i)=>{
    if(!isChecked('changed',i)) return;
    const key=_sceneKey(item.sceneId);
    next.days.forEach(d=>{
      const sc=d.scenes.find(s=>_sceneKey(s.sceneId)===key);
      if(sc){
        if(item.setChanged) sc.set=item.scene.set;
        if(item.descChanged) sc.desc=item.scene.desc;
      }
    });
  });

  // Update show info (name/episode from new draft), keep user settings
  next.show.name=incoming.show.name||next.show.name;
  next.show.episode=incoming.show.episode||next.show.episode;

  // Remove empty days (no scenes left after removals)
  next.days=next.days.filter(d=>d.scenes.length>0);

  state=next;
  _saveId=null; _saveName=null; // mark as unsaved after merge
  save(); closeModal(); currentTab='breakdown'; render(); updateNavInfo();
  showToast('Merge applied — breakdown updated');
}

async function importPDF(e){
  const f=e.target.files[0];
  e.target.value='';
  if(!f) return;

  _pdfServerAvailable=null;
  const ok=await checkPdfServer();
  if(!ok){
    alert(
      'PDF import requires the local server.\n\n'+
      'In Terminal, cd into your BG Board folder and run:\n\n'+
      '    python3 bgboard_server.py\n\n'+
      'Then use the app at http://localhost:8765'
    );
    return;
  }

  // Show spinner
  const btn=document.getElementById('pdf-import-btn');
  const lbl=document.getElementById('pdf-import-label');
  const orig=lbl.textContent;
  lbl.textContent='Parsing… (may take ~1 min for large PDFs)';
  btn.style.pointerEvents='none';

  try{
    // Try new universal schedule parser first (Shamel, ProductionHub, etc.)
    // Fall back to legacy parse-pdf endpoint if unavailable
    let res, data, endpoint;

    try{
      endpoint=SCHEDULE_ENDPOINT;
      res=await fetchWithTimeout(endpoint,{
        method:'POST',
        headers:{'Content-Type':'application/pdf'},
        body:f
      },300000);  // 5 min — OCR on large PDFs can take 90+ seconds
      try{ data=await res.json(); }
      catch(je){ throw new Error('Server returned non-JSON response (status '+res.status+')'); }
    }catch(e1){
      // Fall back to legacy endpoint
      endpoint=PDF_ENDPOINT;
      res=await fetchWithTimeout(endpoint,{
        method:'POST',
        headers:{'Content-Type':'application/pdf'},
        body:f
      },60000);
      try{ data=await res.json(); }
      catch(je){ throw new Error('Server returned non-JSON response (status '+res.status+')'); }
    }

    if(!res.ok||!data.ok){
      alert('Parse error: '+(data.error||'Unknown error'));
      return;
    }
    const s=data.state;
    const dayCount=s.days?.length||0;
    const sceneCount=(s.days||[]).reduce((n,d)=>n+(d.scenes?.length||0),0);
    const roleCount=(s.days||[]).reduce((n,d)=>n+(d.scenes||[]).reduce((m,sc)=>m+(sc.roles?.length||0),0),0);

    if(state.days.length===0){
      // Fresh import — no existing data, just confirm and apply
      if(!confirm(
        `Import schedule?\n\n`+
        `${s.show?.name||'?'}${s.show?.episode?' · Ep '+s.show.episode:''}\n`+
        `${dayCount} shooting days · ${sceneCount} scenes · ${roleCount} BG roles`
      )) return;
      _applyFreshImport(s);
    } else {
      // Existing breakdown — run diff, let user review
      showDiffModal(computeDiff(state, s), s);
    }
  }catch(err){
    alert('PDF import failed: '+err.message);
  }finally{
    lbl.textContent=orig;
    btn.style.pointerEvents='';
  }
}

// Check server availability on load (non-blocking)
setTimeout(checkPdfServer, 800);

function resetAll(){
  if(!confirm('Clear all data and start over?'))return;
  state=defaultState();expandedDays={};save();currentTab='setup';render();
}

function reportIssue(){
  const subject=encodeURIComponent("BG Board Issue Report");
  const body=encodeURIComponent(
    `Issue description:\n\n\n` +
    `Show: ${state.show.name||'(none)'}\n` +
    `Days: ${state.days.length}\n` +
    `App version: BGBoard (local)\n`

  window.location.href=`mailto:rossnovie@mac.com?subject=${subject}&body=${body}`;
}

async function incrementUsage(){
  try{
    const res=await fetch('/usage/increment',{method:'POST'});
    const j=await res.json();
    state._usageCount=j.count;
    // Update counter display if setup tab is visible
    const el=document.getElementById('usage-counter');
    if(el) el.textContent=`sessions: ${j.count}`;
  }catch(e){/* server not running or Railway — silent fail */}
}

function initTheme(){
  const saved=localStorage.getItem('bgboard-theme')||'dark';
  document.documentElement.dataset.theme=saved==='light'?'light':'';
  updateThemeBtn();
}
function toggleTheme(){
  const isLight=document.documentElement.dataset.theme==='light';
  document.documentElement.dataset.theme=isLight?'':'light';
  localStorage.setItem('bgboard-theme',isLight?'dark':'light');
  updateThemeBtn();
}
function updateThemeBtn(){
  const btn=document.getElementById('theme-btn');
  if(!btn) return;
  const isLight=document.documentElement.dataset.theme==='light';
  btn.textContent=isLight?'☀ Light':'☾ Dark';
}
